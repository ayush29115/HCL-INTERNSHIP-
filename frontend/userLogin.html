<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REPTO · secure login & signup</title>
  <!-- Font Awesome 6 (for Google icon & others) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f3f6fc 0%, #e6ecf7 100%);
      padding: 1.5rem;
    }

    /* main card – split view with glassmorphism */
    .auth-card {
      display: flex;
      width: 1060px;
      max-width: 100%;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 20, 50, 0.25), 0 0 0 1px rgba(255,255,255,0.5) inset;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* left side – brand story */
    .brand-panel {
      flex: 1.1;
      background: linear-gradient(155deg, #0b1e42, #12327e, #1b4bbe);
      color: white;
      padding: 3.5rem 2.8rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      isolation: isolate;
    }
    .brand-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.08"><path fill="white" d="M20 20 L30 10 L40 20 L50 5 L60 20 L70 8 L80 22 L90 12 L85 35 L95 45 L80 50 L95 60 L80 68 L92 80 L75 82 L82 95 L65 90 L55 98 L45 85 L30 95 L22 78 L8 82 L15 65 L5 50 L18 40 L5 30 L20 20 Z"/></svg>');
      background-size: 180px;
      background-repeat: repeat;
      opacity: 0.3;
      z-index: -1;
    }

    .brand-panel .logo {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .brand-panel .logo i {
      color: #ffb347;
      font-size: 2.6rem;
    }

    .brand-panel h2 {
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }
    .brand-panel p {
      font-size: 1.2rem;
      opacity: 0.85;
      max-width: 400px;
      margin-bottom: 2.8rem;
      font-weight: 300;
    }
    .feature-list {
      list-style: none;
    }
    .feature-list li {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
      font-weight: 400;
      font-size: 1.1rem;
    }
    .feature-list li i {
      color: #ffb347;
      font-size: 1.4rem;
      width: 28px;
    }

    /* right side – forms */
    .form-panel {
      flex: 1;
      background: white;
      padding: 3.2rem 2.8rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-radius: 0 2.5rem 2.5rem 0;
    }

    .tabs {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 2.2rem;
      border-bottom: 2px solid #eef2f6;
      padding-bottom: 0.8rem;
    }
    .tab {
      font-size: 1.8rem;
      font-weight: 600;
      color: #9aa9b9;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }
    .tab.active {
      color: #0b1e42;
    }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #1b4bbe;
      border-radius: 3px;
    }

    .input-group {
      margin-bottom: 1.2rem;
      position: relative;
    }
    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #7e8c9e;
      font-size: 1.2rem;
    }
    /* for fields with left icon */
    .input-group input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 60px;
      font-size: 1rem;
      transition: 0.2s;
      background: #fafcff;
    }
    .input-group input:focus {
      border-color: #1b4bbe;
      outline: none;
      background: white;
      box-shadow: 0 4px 12px rgba(27,75,190,0.15);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.5rem 0 1.5rem;
      font-size: 0.95rem;
      color: #334155;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: #0b1e42;
      border: none;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 18px rgba(11,30,66,0.2);
    }
    .btn-primary:hover {
      background: #12327e;
      transform: scale(1.02);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      margin: 1.2rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #dde3e9;
    }
    .divider span {
      margin: 0 1rem;
    }

    .btn-google {
      width: 100%;
      padding: 0.9rem;
      background: white;
      border: 1.5px solid #d0d9e4;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-weight: 500;
      color: #1e293b;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 1rem;
    }
    .btn-google i {
      color: #db4437;
      font-size: 1.4rem;
    }
    .btn-google:hover {
      background: #f1f5f9;
      border-color: #a0b3cc;
    }

    .switch-action {
      text-align: center;
      margin-top: 1rem;
      font-size: 1rem;
    }
    .switch-action span {
      color: #1b4bbe;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* dynamic visibility */
    .signup-fields, .login-fields {
      display: block;
    }
    .hidden {
      display: none !important;
    }

    /* simple responsive */
    @media (max-width: 800px) {
      .auth-card { flex-direction: column; border-radius: 2rem; }
      .brand-panel { padding: 2.5rem; text-align: center; align-items: center; }
      .feature-list { text-align: left; }
      .form-panel { border-radius: 0 0 2rem 2rem; }
      .tabs { justify-content: center; }
    }
    @media (max-width: 480px) {
      .brand-panel h2 { font-size: 2rem; }
      .form-panel { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
<div class="auth-card">
  <!-- left side: brand + benefits -->
  <div class="brand-panel">
    <div class="logo">
      <i class="fas fa-bolt"></i> REPTO
    </div>
    <h2>Your electronics hub,<br>one account away</h2>
    <p>Track orders, get exclusive deals, and manage your gear — all in one place.</p>
    <ul class="feature-list">
      <li><i class="fas fa-circle-check"></i> 2-year warranty on every purchase</li>
      <li><i class="fas fa-clock"></i> 30-day easy returns</li>
      <li><i class="fas fa-truck"></i> Free express delivery</li>
      <li><i class="fas fa-headset"></i> 24/7 customer support</li>
    </ul>
  </div>

  <!-- right side: toggling login / signup with all required fields -->
  <div class="form-panel" id="formPanel">
    <!-- tab titles -->
    <div class="tabs">
      <div class="tab active" id="loginTab" onclick="setActiveTab('login')">Log in</div>
      <div class="tab" id="signupTab" onclick="setActiveTab('signup')">Sign up</div>
    </div>

    <!-- ========== LOGIN FIELDS (mobile/email, password) ========= -->
    <div id="loginFields" class="login-fields">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="text" id="loginEmailMobile" placeholder="Email or mobile number" autocomplete="email">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="remember"> <label for="remember">Keep me logged in</label>
      </div>
      <button class="btn-primary" id="loginMainBtn">Log in</button>
    </div>

    <!-- ========== SIGNUP FIELDS (name, mobile/email, password) ========= -->
    <div id="signupFields" class="signup-fields hidden">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="signupName" placeholder="Full name" autocomplete="name">
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="text" id="signupEmailMobile" placeholder="Email or mobile number" autocomplete="email">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signupPassword" placeholder="Password" autocomplete="new-password">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="agree"> <label for="agree">I agree to the Terms and Privacy Policy</label>
      </div>
      <button class="btn-primary" id="signupMainBtn">Create account</button>
    </div>

    <!-- Google login (common for both) -->
    <div class="btn-google" id="googleLoginBtn">
      <i class="fab fa-google"></i> Log in with Google
    </div>

    <!-- Switch link (only visual hint; toggles via tabs) -->
    <div class="switch-action" id="switchLink">
      <span onclick="quickSwitch()" id="dynamicSwitchText">Create new account</span>
    </div>
  </div>
</div>

<script>
  // DOM elements
  const loginTab = document.getElementById('loginTab');
  const signupTab = document.getElementById('signupTab');
  const loginFields = document.getElementById('loginFields');
  const signupFields = document.getElementById('signupFields');
  const switchSpan = document.getElementById('dynamicSwitchText');

  // function to set active tab
  function setActiveTab(tab) {
    if (tab === 'login') {
      // update tabs
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      // show login fields, hide signup
      loginFields.classList.remove('hidden');
      signupFields.classList.add('hidden');
      // switch link text
      switchSpan.innerText = 'Create new account';
    } else {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupFields.classList.remove('hidden');
      loginFields.classList.add('hidden');
      switchSpan.innerText = 'Back to login';
    }
  }

  // quick switch via the bottom link
  function quickSwitch() {
    if (loginFields.classList.contains('hidden')) {
      setActiveTab('login');
    } else {
      setActiveTab('signup');
    }
  }

  // expose functions globally (for onclick)
  window.setActiveTab = setActiveTab;
  window.quickSwitch = quickSwitch;

  // --- demo handlers with field validation (mention mobile/email, name, password) ---
  document.getElementById('loginMainBtn').addEventListener('click', function(e) {
    e.preventDefault();
    const identifier = document.getElementById('loginEmailMobile').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    if (!identifier || !pass) {
      alert('❗ Please enter email/mobile and password.');
      return;
    }
    alert(`🔐 Login attempt with: ${identifier}\n(Password hidden — demo purpose)`);
  });

  document.getElementById('signupMainBtn').addEventListener('click', function(e) {
    e.preventDefault();
    const name = document.getElementById('signupName').value.trim();
    const contact = document.getElementById('signupEmailMobile').value.trim();
    const pass = document.getElementById('signupPassword').value.trim();
    const agree = document.getElementById('agree').checked;

    if (!name || !contact || !pass) {
      alert('❗ Please fill in all fields: name, email/mobile, and password.');
      return;
    }
    if (!agree) {
      alert('❗ You must agree to the Terms to create an account.');
      return;
    }
    alert(`🎉 Welcome, ${name}! Signup successful (demo) with contact: ${contact}`);
  });

  // Google login button – interactive demo
  document.getElementById('googleLoginBtn').addEventListener('click', function() {
    alert('⚡ Google sign-in flow would start here (demo). You can connect Firebase or OAuth.');
  });

  // extra: small detail to sync the bottom link if user clicks tabs manually (already covered)
  // ensure initial state: login visible, signup hidden (already in html, but double-check)
  window.addEventListener('load', function() {
    // explicitly set login active
    setActiveTab('login');
  });
</script>

<!-- add a little footnote (optional) -->
</body>
</html>
