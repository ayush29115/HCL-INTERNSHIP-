<!DOCTYPE html>
<html>
<head>
    <title>REPTO | Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0B1E33;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .splash {
            text-align: center;
            padding: 2rem;
        }
        
        .logo-box {
            border: 4px solid #00D4AA;
            padding: 1rem 3rem;
            margin-bottom: 2rem;
            display: inline-block;
        }
        
        .logo-box h1 {
            color: #00D4AA;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 5px;
        }
        
        .icons {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 2rem 0;
            font-size: 2.5rem;
        }
        
        .tagline {
            color: #FFFFFF;
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin: 1rem 0;
            opacity: 0.9;
        }
        
        .separator {
            width: 100%;
            height: 2px;
            background: #00D4AA;
            margin: 2rem auto;
            opacity: 0.3;
        }
        
        .loading-bar {
            width: 300px;
            height: 4px;
            background: #1E3A5F;
            margin: 2rem auto;
            overflow: hidden;
        }
        
        .loading-progress {
            width: 100%;
            height: 100%;
            background: #00D4AA;
            animation: load 2s ease-in-out infinite;
        }
        
        .loading-text {
            color: #FFFFFF;
            font-size: 1rem;
            letter-spacing: 2px;
            margin: 1rem 0;
        }
        
        .secure-badge {
            color: #00D4AA;
            font-size: 0.9rem;
            border: 1px solid #00D4AA;
            padding: 0.5rem 1.5rem;
            display: inline-block;
            margin-top: 2rem;
            letter-spacing: 2px;
        }
        
        @keyframes load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 5px #00D4AA; }
            50% { box-shadow: 0 0 20px #00D4AA; }
            100% { box-shadow: 0 0 5px #00D4AA; }
        }
        
        .logo-box {
            animation: glow 2s infinite;
        }
    </style>
</head>
<body>
    <div class="splash">
        <!-- Logo -->
        <div class="logo-box">
            <h1>REPTO</h1>
        </div>
        
        <!-- Icons -->
        <div class="icons">
            <span>🛒</span>
            <span>🔧</span>
            <span>♻️</span>
        </div>
        
        <!-- Tagline -->
        <div class="tagline">
            SHOP · REPAIR · E-WASTE
        </div>
        
        <!-- Separator -->
        <div class="separator"></div>
        
        <!-- Loading Animation -->
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
        
        <div class="loading-text">
            LOADING...
        </div>
        
        <!-- Secure Badge -->
        <div class="secure-badge">
            🔒 SECURE PLATFORM
        </div>
    </div>
    
    <script>
        // Auto redirect after 2.5 seconds
        setTimeout(() => {
             window.location.href = "select.html"; // Uncomment when home page is ready
            console.log("REPTO - Ready to launch");
        }, 2000);
    </script>
</body>
</html>
