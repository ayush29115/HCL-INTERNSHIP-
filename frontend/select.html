<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPTO | Select Service</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f1a2f, #1e3a5f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            text-align: center;
        }

        /* HEADER */
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .icon-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid;
            transition: 0.2s;
        }

        .admin {
            color: #ff9900;
            border-color: #ff9900;
        }

        .admin:hover {
            background: #ff9900;
            color: #0f1a2f;
        }

        .user {
            color: #00d4aa;
            border-color: #00d4aa;
        }

        .user:hover {
            background: #00d4aa;
            color: #0f1a2f;
        }

        /* LOGO */
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffb347, #ff7e05);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            margin-top: 10px;
            color: #cbd5e1;
        }

        /* SERVICES */
        .services {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .card {
            background: #1a2640;
            padding: 30px;
            border-radius: 25px;
            width: 260px;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid #2f3b5a;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #ff9900;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card h2 {
            margin-bottom: 15px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 40px;
            border: 2px solid #ff9900;
            background: transparent;
            color: #ff9900;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover .btn {
            background: #ff9900;
            color: #0f1a2f;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- TOP ICONS -->
    <div class="top-bar">
        <div class="icon-btn admin" onclick="openLogin('admin')">
            <i class="fas fa-user-shield"></i>
        </div>

        <div class="icon-btn user" onclick="openLogin('user')">
            <i class="fas fa-user"></i>
        </div>
    </div>

    <!-- LOGO -->
    <div class="logo">REPTO</div>
    <div class="tagline">Repair · Shop · Recycle</div>

    <!-- SERVICES -->
    <div class="services">

        <div class="card" onclick="goTo('shop')">
            <h2>🛒 SHOP</h2>
            <button class="btn" onclick="event.stopPropagation(); goTo('shop')">CLICK NOW</button>
        </div>

        <div class="card" onclick="goTo('repair')">
            <h2>🔧 REPAIR</h2>
            <button class="btn" onclick="event.stopPropagation(); goTo('repair')">CLICK NOW</button>
        </div>

        <div class="card" onclick="goTo('recycle')">
            <h2>♻️ RECYCLE</h2>
            <button class="btn" onclick="event.stopPropagation(); goTo('recycle')">CLICK NOW</button>
        </div>

    </div>

</div>

<script>

function goTo(page) {
    if (page === "shop") {
        window.location.href = "./shop/frontend/shop.html";   // ✅ CONNECTED
    }
    if (page === "repair") {
        window.location.href = "./repair/frontend/repair.html";
    }
    if (page === "recycle") {
        window.location.href = "./recycle/frontend/recycle.html";
    }
}

function openLogin(role) {
    if (role === "admin") {
        window.location.href = "adminLogin.html";
    } else {
        window.location.href = "userLogin.html";
    }
}

</script>

</body>
</html>
