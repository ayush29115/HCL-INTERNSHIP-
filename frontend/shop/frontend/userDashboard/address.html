<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPTO · address book · edit + location</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Leaflet (open source map) for location picker -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f7fc;
            color: #1e293b;
        }

        .address-page {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 32px;
        }

        /* header */
        .address-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .address-header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(145deg, #0b1e42, #1e3a6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            background: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            color: #0b1e42;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.04);
            border: 1px solid #dee9f5;
            transition: 0.2s;
        }

        .back-link:hover {
            border-color: #ff9900;
            transform: translateX(-4px);
        }

        /* add new address button */
        .add-address-btn {
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            border: 1px solid #ff9900;
            transition: 0.2s;
        }

        .add-address-btn:hover {
            background: #ffaa2a;
            transform: scale(1.02);
        }

        /* addresses grid */
        .addresses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        /* address card */
        .address-card {
            background: white;
            border-radius: 32px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.1);
            padding: 24px;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
        }

        .address-card:hover {
            transform: translateY(-4px);
            border-color: #ff9900;
            box-shadow: 0 28px 48px -18px #ff9900;
        }

        .address-card.selected {
            border: 2px solid #ff9900;
            background: #fff9f0;
        }

        .address-type {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .type-badge {
            background: #0b1e42;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .type-badge.home { background: #22a65e; }
        .type-badge.office { background: #1960b3; }
        .type-badge.other { background: #b45b0a; }

        .default-badge {
            background: #ff9900;
            color: #0b1e42;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: auto;
        }

        .address-details {
            margin: 16px 0;
        }

        .address-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #0b1e42;
            margin-bottom: 8px;
        }

        .address-line {
            color: #4b5b79;
            line-height: 1.6;
            margin-bottom: 4px;
        }

        .address-phone {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .address-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            border-top: 1px solid #ecf3fe;
            padding-top: 20px;
        }

        .edit-btn, .delete-btn, .set-default-btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-btn {
            background: #f0f5ff;
            color: #0b1e42;
        }

        .edit-btn:hover {
            background: #ff9900;
            color: #0b1e42;
        }

        .delete-btn {
            background: #fee2e2;
            color: #b91c1c;
        }

        .delete-btn:hover {
            background: #fecaca;
        }

        .set-default-btn {
            background: #0b1e42;
            color: white;
            margin-left: auto;
        }

        .set-default-btn:hover {
            background: #ff9900;
            color: #0b1e42;
        }

        /* modal overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 36px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
            background: #f0f5ff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #ff9900;
            color: white;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b1e42;
            margin-bottom: 28px;
        }

        /* form styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #0b1e42;
            margin-bottom: 8px;
            display: block;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #d4e0f0;
            border-radius: 60px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .form-textarea {
            border-radius: 28px;
            min-height: 100px;
            resize: vertical;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #ff9900;
            box-shadow: 0 0 0 3px rgba(255,153,0,0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin: 16px 0;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-label input[type="radio"] {
            accent-color: #ff9900;
            width: 18px;
            height: 18px;
        }

        /* location picker */
        .location-picker {
            margin: 24px 0;
            border: 1px solid #d4e0f0;
            border-radius: 28px;
            overflow: hidden;
        }

        #map {
            height: 250px;
            width: 100%;
            z-index: 1;
        }

        .location-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .get-location-btn {
            background: #f0f5ff;
            border: 1px solid #d4e0f0;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .get-location-btn:hover {
            background: #ff9900;
        }

        .coordinates {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .save-btn {
            flex: 1;
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            background: #f0f5ff;
            color: #64748b;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
        }

        /* toast */
        .toast-message {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #0b1e42; color: white; padding: 16px 40px;
            border-radius: 60px; z-index: 3000; animation: fadeInOut 2.2s forwards;
            font-weight: 500; box-shadow: 0 20px 40px rgba(255,153,0,0.3);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -10px); }
        }
    </style>
</head>
<body>
    <div class="address-page">
        <!-- header -->
        <div class="address-header">
            <h1><i class="fas fa-map-marker-alt" style="color:#ff9900;"></i> address book</h1>
            <a href="#" class="back-link" onclick="showToast('← back to dashboard'); return false;"><i class="fas fa-arrow-left"></i> dashboard</a>
        </div>

        <!-- add new address button -->
        <button class="add-address-btn" onclick="openAddAddressModal()">
            <i class="fas fa-plus"></i> add new address
        </button>

        <!-- addresses grid container -->
        <div id="addressesContainer" class="addresses-grid">
            <!-- dynamically rendered -->
        </div>
    </div>

    <!-- address modal (add/edit) -->
    <div class="modal-overlay" id="addressModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></div>
            <div class="modal-title" id="modalTitle">add new address</div>
            
            <form id="addressForm" onsubmit="event.preventDefault(); saveAddress();">
                <!-- name -->
                <div class="form-group">
                    <label class="form-label">full name</label>
                    <input type="text" class="form-input" id="fullName" placeholder="Rajan Kumar" required>
                </div>

                <!-- phone -->
                <div class="form-group">
                    <label class="form-label">phone number</label>
                    <input type="tel" class="form-input" id="phone" placeholder="+91 98765 43210" required>
                </div>

                <!-- address line 1 -->
                <div class="form-group">
                    <label class="form-label">address line 1</label>
                    <input type="text" class="form-input" id="addressLine1" placeholder="flat / house no., building" required>
                </div>

                <!-- address line 2 -->
                <div class="form-group">
                    <label class="form-label">address line 2 (optional)</label>
                    <input type="text" class="form-input" id="addressLine2" placeholder="area, landmark">
                </div>

                <!-- city, state, pincode row -->
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                    <div class="form-group">
                        <label class="form-label">city</label>
                        <input type="text" class="form-input" id="city" placeholder="Mumbai" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">state</label>
                        <input type="text" class="form-input" id="state" placeholder="Maharashtra" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">pincode</label>
                        <input type="text" class="form-input" id="pincode" placeholder="400093" required>
                    </div>
                </div>

                <!-- address type -->
                <div class="form-group">
                    <label class="form-label">address type</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="addressType" value="home" checked> <i class="fas fa-home"></i> home
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="addressType" value="office"> <i class="fas fa-briefcase"></i> office
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="addressType" value="other"> <i class="fas fa-map-pin"></i> other
                        </label>
                    </div>
                </div>

                <!-- location picker (map) -->
                <div class="form-group">
                    <label class="form-label">pin your location <span style="color:#64748b; font-weight:400;">(click on map)</span></label>
                    <div class="location-picker">
                        <div id="map"></div>
                    </div>
                    <div class="location-actions">
                        <button type="button" class="get-location-btn" onclick="getUserLocation()">
                            <i class="fas fa-location-dot"></i> use my current location
                        </button>
                    </div>
                    <div class="coordinates" id="coordinates">
                        lat: 19.0760, lng: 72.8777 (Mumbai)
                    </div>
                </div>

                <!-- set as default checkbox -->
                <div class="form-group" style="margin: 20px 0;">
                    <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                        <input type="checkbox" id="setDefault" style="width: 18px; height: 18px;"> 
                        <span style="font-weight:500;">set as default address</span>
                    </label>
                </div>

                <!-- form actions -->
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">cancel</button>
                    <button type="submit" class="save-btn">save address</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ---------- ADDRESS DATA ----------
        let addresses = [
            {
                id: 'addr1',
                name: 'Rajan Kumar',
                phone: '+91 98765 43210',
                line1: '304, Galaxy Apartments',
                line2: 'Andheri East, near station',
                city: 'Mumbai',
                state: 'Maharashtra',
                pincode: '400093',
                type: 'home',
                lat: 19.0760,
                lng: 72.8777,
                isDefault: true
            },
            {
                id: 'addr2',
                name: 'Rajan Kumar',
                phone: '+91 98765 43210',
                line1: '12th floor, BKC Office',
                line2: 'Bandra Kurla Complex',
                city: 'Mumbai',
                state: 'Maharashtra',
                pincode: '400051',
                type: 'office',
                lat: 19.0596,
                lng: 72.8295,
                isDefault: false
            },
            {
                id: 'addr3',
                name: 'Rajan Kumar',
                phone: '+91 98765 43210',
                line1: '45, Lakeview Villa',
                line2: 'Powai, near lake',
                city: 'Mumbai',
                state: 'Maharashtra',
                pincode: '400076',
                type: 'other',
                lat: 19.1176,
                lng: 72.9060,
                isDefault: false
            }
        ];

        let editingId = null; // for edit mode
        let map = null;
        let marker = null;
        let selectedLat = 19.0760;
        let selectedLng = 72.8777;

        // initialize map when modal opens
        function initMap(lat = 19.0760, lng = 72.8777) {
            selectedLat = lat;
            selectedLng = lng;
            
            if (!map) {
                map = L.map('map').setView([lat, lng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
                
                marker = L.marker([lat, lng], { draggable: true }).addTo(map);
                
                marker.on('dragend', function(e) {
                    const pos = e.target.getLatLng();
                    selectedLat = pos.lat;
                    selectedLng = pos.lng;
                    updateCoordinates(pos.lat, pos.lng);
                });
                
                map.on('click', function(e) {
                    const latlng = e.latlng;
                    marker.setLatLng(latlng);
                    selectedLat = latlng.lat;
                    selectedLng = latlng.lng;
                    updateCoordinates(latlng.lat, latlng.lng);
                });
            } else {
                map.setView([lat, lng], 13);
                marker.setLatLng([lat, lng]);
            }
            updateCoordinates(lat, lng);
        }

        function updateCoordinates(lat, lng) {
            document.getElementById('coordinates').innerText = `lat: ${lat.toFixed(4)}, lng: ${lng.toFixed(4)}`;
        }

        // get user's current location
        window.getUserLocation = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        if (map && marker) {
                            map.setView([lat, lng], 15);
                            marker.setLatLng([lat, lng]);
                            selectedLat = lat;
                            selectedLng = lng;
                            updateCoordinates(lat, lng);
                            showToast('📍 location updated');
                        }
                    },
                    (error) => {
                        showToast('❌ unable to get location');
                    }
                );
            } else {
                showToast('geolocation not supported');
            }
        };

        // render addresses
        function renderAddresses() {
            const container = document.getElementById('addressesContainer');
            if (!container) return;

            if (addresses.length === 0) {
                container.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px; background:white; border-radius:48px;">
                        <i class="fas fa-map-marked-alt" style="font-size:4rem; color:#cbd5e1;"></i>
                        <p style="margin-top:20px; font-size:1.2rem;">no saved addresses</p>
                    </div>
                `;
                return;
            }

            let html = '';
            addresses.forEach(addr => {
                const typeClass = addr.type;
                const defaultBadge = addr.isDefault ? '<span class="default-badge"><i class="fas fa-check-circle"></i> default</span>' : '';
                
                html += `
                    <div class="address-card ${addr.isDefault ? 'selected' : ''}" onclick="selectAddress('${addr.id}')">
                        <div class="address-type">
                            <span class="type-badge ${typeClass}"><i class="fas ${addr.type === 'home' ? 'fa-home' : addr.type === 'office' ? 'fa-briefcase' : 'fa-map-pin'}"></i> ${addr.type}</span>
                            ${defaultBadge}
                        </div>
                        <div class="address-details">
                            <div class="address-name">${addr.name}</div>
                            <div class="address-line">${addr.line1}</div>
                            ${addr.line2 ? `<div class="address-line">${addr.line2}</div>` : ''}
                            <div class="address-line">${addr.city}, ${addr.state} - ${addr.pincode}</div>
                            <div class="address-phone"><i class="fas fa-phone"></i> ${addr.phone}</div>
                        </div>
                        <div class="address-actions" onclick="event.stopPropagation()">
                            <button class="edit-btn" onclick="editAddress('${addr.id}')"><i class="fas fa-edit"></i> edit</button>
                            <button class="delete-btn" onclick="deleteAddress('${addr.id}')"><i class="fas fa-trash"></i> delete</button>
                            ${!addr.isDefault ? `<button class="set-default-btn" onclick="setDefaultAddress('${addr.id}')"><i class="fas fa-star"></i> set default</button>` : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // open modal for add
        window.openAddAddressModal = function() {
            editingId = null;
            document.getElementById('modalTitle').innerText = 'add new address';
            document.getElementById('addressForm').reset();
            document.querySelector('input[name="addressType"][value="home"]').checked = true;
            document.getElementById('setDefault').checked = false;
            
            // reset location to Mumbai
            selectedLat = 19.0760;
            selectedLng = 72.8777;
            
            document.getElementById('addressModal').classList.add('active');
            setTimeout(() => {
                initMap(19.0760, 72.8777);
            }, 200);
        };

        // edit address
        window.editAddress = function(id) {
            const addr = addresses.find(a => a.id === id);
            if (!addr) return;
            
            editingId = id;
            document.getElementById('modalTitle').innerText = 'edit address';
            
            // fill form
            document.getElementById('fullName').value = addr.name;
            document.getElementById('phone').value = addr.phone;
            document.getElementById('addressLine1').value = addr.line1;
            document.getElementById('addressLine2').value = addr.line2 || '';
            document.getElementById('city').value = addr.city;
            document.getElementById('state').value = addr.state;
            document.getElementById('pincode').value = addr.pincode;
            
            // set type
            document.querySelector(`input[name="addressType"][value="${addr.type}"]`).checked = true;
            
            // set default checkbox (only if it's default)
            document.getElementById('setDefault').checked = addr.isDefault || false;
            
            // set location
            selectedLat = addr.lat || 19.0760;
            selectedLng = addr.lng || 72.8777;
            
            document.getElementById('addressModal').classList.add('active');
            setTimeout(() => {
                initMap(selectedLat, selectedLng);
            }, 200);
        };

        // save address (add or update)
        window.saveAddress = function() {
            // get form values
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const line1 = document.getElementById('addressLine1').value;
            const line2 = document.getElementById('addressLine2').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;
            const pincode = document.getElementById('pincode').value;
            const type = document.querySelector('input[name="addressType"]:checked').value;
            const setDefault = document.getElementById('setDefault').checked;

            if (!name || !phone || !line1 || !city || !state || !pincode) {
                showToast('please fill all required fields');
                return;
            }

            const addressData = {
                name,
                phone,
                line1,
                line2,
                city,
                state,
                pincode,
                type,
                lat: selectedLat,
                lng: selectedLng,
                isDefault: setDefault
            };

            if (editingId) {
                // update existing
                const index = addresses.findIndex(a => a.id === editingId);
                if (index !== -1) {
                    addresses[index] = { ...addresses[index], ...addressData, id: editingId };
                    showToast('address updated');
                }
            } else {
                // add new with unique id
                const newId = 'addr_' + Date.now() + Math.random().toString(36).substr(2, 5);
                addresses.push({ ...addressData, id: newId });
                showToast('new address added');
            }

            // handle default logic (only one default)
            if (setDefault) {
                addresses = addresses.map(addr => {
                    if (addr.id === editingId || (!editingId && addr.id === newId)) {
                        return { ...addr, isDefault: true };
                    } else {
                        return { ...addr, isDefault: false };
                    }
                });
            }

            closeModal();
            renderAddresses();
        };

        // delete address
        window.deleteAddress = function(id) {
            if (confirm('are you sure you want to delete this address?')) {
                addresses = addresses.filter(addr => addr.id !== id);
                renderAddresses();
                showToast('address deleted');
            }
        };

        // set as default
        window.setDefaultAddress = function(id) {
            addresses = addresses.map(addr => ({
                ...addr,
                isDefault: addr.id === id
            }));
            renderAddresses();
            showToast('default address updated');
        };

        // select address (for checkout etc)
        window.selectAddress = function(id) {
            showToast(`address selected (demo)`);
        };

        // close modal
        window.closeModal = function() {
            document.getElementById('addressModal').classList.remove('active');
            editingId = null;
        };

        // toast
        window.showToast = function(msg) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2200);
        };

        // prevent link navigation
        document.querySelectorAll('a[href="#"]').forEach(link => {
            link.addEventListener('click', (e) => e.preventDefault());
        });

        // initial render
        renderAddresses();

        // close modal on overlay click
        document.getElementById('addressModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
