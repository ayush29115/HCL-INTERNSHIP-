<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPTO · admin · inventory management</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f7fc;
            color: #1e293b;
        }

        /* admin layout */
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* sidebar (same as admin panel) */
        .admin-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0c1427 0%, #0f1a2f 100%);
            color: #eef3ff;
            padding: 32px 20px;
            border-right: 1px solid #2a3a5a;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 8px 0 24px rgba(0,0,0,0.06);
        }

        .admin-sidebar h2 {
            color: #ffb347;
            font-size: 2rem;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            font-weight: 700;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 20px;
        }

        .admin-sidebar h2 i {
            color: #ff9900;
            background: rgba(255,153,0,0.15);
            padding: 8px;
            border-radius: 14px;
        }

        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 22px;
            margin: 6px 0;
            border-radius: 16px;
            background: rgba(26, 38, 64, 0.6);
            border: 1px solid #2e3d5e;
            color: #dbecff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-nav-item i {
            color: #ff9900;
            width: 24px;
            font-size: 1.25rem;
        }

        .admin-nav-item:hover {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            transform: translateX(6px);
        }

        .admin-nav-item:hover i {
            color: #0b1425;
        }

        .admin-nav-item.active {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            font-weight: 600;
            box-shadow: 0 10px 18px -6px #ff9900;
        }

        .admin-nav-item.active i {
            color: #0b1425;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 36px;
            font-size: 0.8rem;
            color: #98a9c7;
            border-top: 1px dashed #2b3d60;
        }

        /* main content */
        .admin-main {
            flex: 1;
            padding: 36px 42px;
            background: #f4f7fc;
            overflow-y: auto;
        }

        /* top bar */
        .admin-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-top-bar h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            padding: 10px 24px 10px 20px;
            border-radius: 60px;
            border: 1px solid #dee9f5;
            box-shadow: 0 8px 18px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .admin-profile i {
            font-size: 2rem;
            color: #ff9900;
        }

        .admin-profile span {
            font-weight: 600;
        }

        /* inventory summary cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .summary-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.08);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .summary-icon {
            width: 56px;
            height: 56px;
            background: #ffeed9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9900;
            font-size: 1.8rem;
        }

        .summary-content h3 {
            font-size: 0.9rem;
            font-weight: 500;
            color: #64748b;
        }

        .summary-content .value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0b1e42;
            line-height: 1.2;
        }

        .summary-trend {
            font-size: 0.8rem;
            color: #22a65e;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* filters bar */
        .filters-bar {
            background: white;
            border-radius: 80px;
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 8px 22px rgba(0,0,0,0.02);
        }

        .search-box {
            flex: 2;
            min-width: 280px;
            display: flex;
            align-items: center;
            background: #f8fafd;
            border-radius: 60px;
            padding: 0 20px;
            border: 1px solid #d4e0f0;
        }

        .search-box i {
            color: #ff9900;
        }

        .search-box input {
            flex: 1;
            padding: 14px 16px;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #d4e0f0;
            background: white;
            font-weight: 500;
            color: #0b1e42;
            cursor: pointer;
            outline: none;
        }

        /* inventory table */
        .inventory-table-container {
            background: white;
            border-radius: 32px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.1);
            overflow: auto;
            margin-bottom: 40px;
        }

        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        .inventory-table th {
            text-align: left;
            padding: 22px 20px;
            background: #f8fafd;
            color: #0b1e42;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid #ecf3fe;
        }

        .inventory-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #ecf3fe;
        }

        .inventory-table tbody tr {
            cursor: pointer;
            transition: 0.15s;
        }

        .inventory-table tbody tr:hover {
            background: #fff9f0;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-thumb {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            background-color: #eaf0f8;
        }

        .product-details {
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-weight: 700;
            color: #0b1e42;
        }

        .product-sku {
            font-size: 0.7rem;
            color: #64748b;
        }

        .stock-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stock-bar {
            width: 80px;
            height: 8px;
            background: #ecf3fe;
            border-radius: 4px;
            overflow: hidden;
        }

        .stock-fill {
            height: 100%;
            border-radius: 4px;
        }

        .stock-fill.high { background: #22a65e; }
        .stock-fill.medium { background: #ff9900; }
        .stock-fill.low { background: #b91c1c; }

        .stock-value {
            font-weight: 600;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-block;
        }

        .status-in { background: #e2f0e8; color: #1f7840; }
        .status-low { background: #fff2d9; color: #b45b0a; }
        .status-out { background: #ffe6e6; color: #b32626; }
        .status-ordered { background: #e0ecfe; color: #1960b3; }

        .action-btn {
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 8px;
        }

        .action-btn.outline {
            background: transparent;
            border: 1px solid #ff9900;
        }

        /* low stock alerts */
        .alerts-section {
            background: white;
            border-radius: 32px;
            padding: 28px;
            border: 1px solid #ecf3fe;
            margin-bottom: 40px;
        }

        .alerts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .alerts-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .alert-card {
            background: #fff2d9;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .alert-card.critical {
            background: #ffe6e6;
        }

        .alert-icon {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9900;
            font-size: 1.3rem;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 700;
            color: #0b1e42;
            margin-bottom: 4px;
        }

        .alert-desc {
            font-size: 0.8rem;
            color: #64748b;
        }

        .alert-action {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        /* stock movement section */
        .movement-section {
            background: white;
            border-radius: 32px;
            padding: 28px;
            border: 1px solid #ecf3fe;
            margin-bottom: 40px;
        }

        .movement-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .movement-timeline {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .movement-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid #ecf3fe;
        }

        .movement-item:last-child {
            border-bottom: none;
        }

        .movement-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f0f5ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9900;
        }

        .movement-details {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .movement-product {
            font-weight: 600;
            color: #0b1e42;
        }

        .movement-meta {
            color: #64748b;
            font-size: 0.8rem;
        }

        .movement-qty {
            font-weight: 700;
        }

        .movement-qty.plus { color: #22a65e; }
        .movement-qty.minus { color: #b91c1c; }

        /* pagination */
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 24px;
        }

        .page-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #d4e0f0;
            background: white;
            cursor: pointer;
            font-weight: 600;
        }

        .page-btn.active {
            background: #ff9900;
            color: #0b1e42;
            border-color: #ff9900;
        }

        /* modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
            background: #f0f5ff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #ff9900;
            color: white;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0b1e42;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #0b1e42;
            margin-bottom: 8px;
            display: block;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #d4e0f0;
            border-radius: 60px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #ff9900;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .save-btn {
            flex: 1;
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            background: #f0f5ff;
            color: #64748b;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
        }

        /* toast */
        .toast-message {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #0b1e42; color: white; padding: 16px 40px;
            border-radius: 60px; z-index: 3000; animation: fadeInOut 2.2s forwards;
            font-weight: 500; box-shadow: 0 20px 40px rgba(255,153,0,0.3);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -10px); }
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <h2><i class="fas fa-chart-line"></i> REPTO admin</h2>
            
            <div class="admin-nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-tachometer-alt"></i> dashboard
            </div>
            <div class="admin-nav-item" onclick="window.location.href='orders.html'">
                <i class="fas fa-shopping-bag"></i> orders
            </div>
            <div class="admin-nav-item" onclick="window.location.href='products.html'">
                <i class="fas fa-boxes"></i> products
            </div>
            <div class="admin-nav-item" onclick="window.location.href='users.html'">
                <i class="fas fa-users"></i> users
            </div>
            <div class="admin-nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-pie"></i> analytics
            </div>
            <div class="admin-nav-item active" onclick="window.location.href='inventory.html'">
                <i class="fas fa-warehouse"></i> inventory
            </div>
            <div class="admin-nav-item" onclick="window.location.href='marketing.html'">
                <i class="fas fa-bullhorn"></i> marketing
            </div>
            <div class="admin-nav-item" onclick="window.location.href='setting.html'">
                <i class="fas fa-cog"></i> settings
            </div>

            <div class="sidebar-footer">
                <i class="fas fa-shield-alt"></i> admin · inventory management
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="admin-main">
            <!-- top bar -->
            <div class="admin-top-bar">
                <h1><i class="fas fa-warehouse" style="color:#ff9900;"></i> inventory</h1>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div class="admin-profile" onclick="showToast('admin profile')">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                    </div>
                </div>
            </div>

            <!-- summary cards -->
            <div class="summary-grid" id="summaryGrid">
                <!-- filled by js -->
            </div>

            <!-- filters -->
            <div class="filters-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="search by product name, SKU, supplier..." id="searchInput" onkeyup="filterInventory()">
                </div>
                <div class="filter-group">
                    <select class="filter-select" id="stockFilter" onchange="filterInventory()">
                        <option value="all">all stock</option>
                        <option value="in">in stock</option>
                        <option value="low">low stock</option>
                        <option value="out">out of stock</option>
                        <option value="ordered">reorder pending</option>
                    </select>
                    <select class="filter-select" id="supplierFilter" onchange="filterInventory()">
                        <option value="all">all suppliers</option>
                        <option value="apple">Apple</option>
                        <option value="samsung">Samsung</option>
                        <option value="sony">Sony</option>
                        <option value="dji">DJI</option>
                        <option value="canon">Canon</option>
                    </select>
                </div>
            </div>

            <!-- low stock alerts section -->
            <div class="alerts-section" id="alertsSection">
                <!-- filled by js -->
            </div>

            <!-- inventory table -->
            <div class="inventory-table-container">
                <table class="inventory-table" id="inventoryTable">
                    <thead>
                        <tr>
                            <th>product</th>
                            <th>category</th>
                            <th>supplier</th>
                            <th>stock</th>
                            <th>reorder point</th>
                            <th>status</th>
                            <th>last restock</th>
                            <th>actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <!-- filled by js -->
                    </tbody>
                </table>
            </div>

            <!-- pagination -->
            <div class="pagination" id="pagination">
                <!-- filled by js -->
            </div>

            <!-- stock movement section -->
            <div class="movement-section">
                <div class="movement-header">
                    <h3><i class="fas fa-history" style="color:#ff9900;"></i> recent stock movements</h3>
                    <button class="action-btn" onclick="showToast('view all movements')">view all</button>
                </div>
                <div class="movement-timeline" id="movementTimeline">
                    <!-- filled by js -->
                </div>
            </div>
        </main>
    </div>

    <!-- restock modal -->
    <div class="modal-overlay" id="restockModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeRestockModal()"><i class="fas fa-times"></i></div>
            <div class="modal-title" id="restockModalTitle">restock product</div>
            
            <form id="restockForm" onsubmit="event.preventDefault(); saveRestock();">
                <div class="form-group">
                    <label class="form-label">product</label>
                    <input type="text" class="form-input" id="restockProductName" readonly>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">current stock</label>
                        <input type="text" class="form-input" id="restockCurrentStock" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">reorder point</label>
                        <input type="number" class="form-input" id="restockReorderPoint">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">quantity to add</label>
                    <input type="number" class="form-input" id="restockQuantity" placeholder="enter quantity" required>
                </div>

                <div class="form-group">
                    <label class="form-label">supplier</label>
                    <select class="form-select" id="restockSupplier">
                        <option value="Apple">Apple Inc.</option>
                        <option value="Samsung">Samsung Electronics</option>
                        <option value="Sony">Sony India</option>
                        <option value="DJI">DJI Innovations</option>
                        <option value="Canon">Canon India</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">expected delivery</label>
                    <input type="date" class="form-input" id="restockDate" value="2026-03-25">
                </div>

                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeRestockModal()">cancel</button>
                    <button type="submit" class="save-btn">confirm restock</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ---------- INVENTORY DATA ----------
        let inventoryData = [
            { 
                id: 1,
                name: 'iPhone 15 Pro', 
                sku: 'APL-IP15P-256',
                category: 'Smartphones',
                supplier: 'Apple',
                stock: 45,
                reorderPoint: 20,
                status: 'in',
                lastRestock: '2026-03-10',
                location: 'Warehouse A',
                cost: 110000,
                price: 129999,
                img: 'https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=200'
            },
            { 
                id: 2,
                name: 'Samsung S24 Ultra', 
                sku: 'SMS-S24U-512',
                category: 'Smartphones',
                supplier: 'Samsung',
                stock: 38,
                reorderPoint: 15,
                status: 'in',
                lastRestock: '2026-03-12',
                location: 'Warehouse A',

        let currentPage = 1;
        const itemsPerPage = 5;
        let filteredInventory = [...inventoryData];

        // render summary cards
        function renderSummary() {
            const totalProducts = inventoryData.length;
            const totalStock = inventoryData.reduce((acc, item) => acc + item.stock, 0);
            const lowStock = inventoryData.filter(item => item.status === 'low').length;
            const outOfStock = inventoryData.filter(item => item.status === 'out').length;
            const totalValue = inventoryData.reduce((acc, item) => acc + (item.cost * item.stock), 0);

            const grid = document.getElementById('summaryGrid');
            grid.innerHTML = `
                <div class="summary-card">
                    <div class="summary-icon"><i class="fas fa-boxes"></i></div>
                    <div class="summary-content">
                        <h3>total products</h3>
                        <div class="value">${totalProducts}</div>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon"><i class="fas fa-cubes"></i></div>
                    <div class="summary-content">
                        <h3>total units</h3>
                        <div class="value">${totalStock}</div>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="summary-content">
                        <h3>low stock</h3>
                        <div class="value">${lowStock}</div>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon"><i class="fas fa-times-circle"></i></div>
                    <div class="summary-content">
                        <h3>out of stock</h3>
                        <div class="value">${outOfStock}</div>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon"><i class="fas fa-rupee-sign"></i></div>
                    <div class="summary-content">
                        <h3>inventory value</h3>
                        <div class="value">₹${(totalValue/1000000).toFixed(1)}M</div>
                    </div>
                </div>
            `;
        }

        // render alerts section
        function renderAlerts() {
            const lowStockItems = inventoryData.filter(item => item.status === 'low' || item.status === 'out').slice(0, 3);
            let alertsHtml = `
                <div class="alerts-header">
                    <h3><i class="fas fa-bell" style="color:#ff9900;"></i> inventory alerts (${lowStockItems.length})</h3>
                    <button class="action-btn" onclick="showToast('view all alerts')">view all</button>
                </div>
                <div class="alert-grid">
            `;

            lowStockItems.forEach(item => {
                const isCritical = item.stock === 0;
                alertsHtml += `
                    <div class="alert-card ${isCritical ? 'critical' : ''}">
                        <div class="alert-icon"><i class="fas ${isCritical ? 'fa-times-circle' : 'fa-exclamation-triangle'}"></i></div>
                        <div class="alert-content">
                            <div class="alert-title">${item.name}</div>
                            <div class="alert-desc">stock: ${item.stock} | reorder at ${item.reorderPoint}</div>
                        </div>
                        <button class="alert-action" onclick="openRestockModal(${item.id})">restock</button>
                    </div>
                `;
            });

            alertsHtml += '</div>';
            document.getElementById('alertsSection').innerHTML = alertsHtml;
        }

        // render inventory table
        function renderInventory() {
            const tbody = document.getElementById('inventoryTableBody');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredInventory.slice(start, end);

            if (pageItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">no inventory items found</td></tr>';
                renderPagination();
                return;
            }

            let html = '';
            pageItems.forEach(item => {
                const stockPercent = (item.stock / item.reorderPoint) * 100;
                let stockClass = 'high';
                if (item.status === 'low') stockClass = 'medium';
                if (item.status === 'out') stockClass = 'low';
                
                const statusClass = `status-${item.status}`;
                
                html += `
                    <tr onclick="viewProduct(${item.id})">
                        <td>
                            <div class="product-info">
                                <div class="product-thumb" style="background-image:url('${item.img}')"></div>
                                <div class="product-details">
                                    <span class="product-name">${item.name}</span>
                                    <span class="product-sku">SKU: ${item.sku}</span>
                                </div>
                            </div>
                        </td>
                        <td>${item.category}</td>
                        <td>${item.supplier}</td>
                        <td>
                            <div class="stock-indicator">
                                <span class="stock-value">${item.stock}</span>
                                <div class="stock-bar">
                                    <div class="stock-fill ${stockClass}" style="width: ${Math.min(stockPercent, 100)}%"></div>
                                </div>
                            </div>
                        </td>
                        <td>${item.reorderPoint}</td>
                        <td><span class="status-badge ${statusClass}">${item.status}</span></td>
                        <td>${new Date(item.lastRestock).toLocaleDateString('en-IN')}</td>
                        <td onclick="event.stopPropagation();">
                            <button class="action-btn" onclick="openRestockModal(${item.id})"><i class="fas fa-truck"></i> restock</button>
                            <button class="action-btn outline" onclick="editInventory(${item.id})"><i class="fas fa-edit"></i></button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
            renderPagination();
        }

        // render stock movement
        function renderMovements() {
            const movements = [
                { product: 'iPhone 15 Pro', type: 'in', qty: 20, date: '2026-03-18', time: '10:30 AM', user: 'Admin' },
                { product: 'AirPods Pro 2', type: 'out', qty: 5, date: '2026-03-18', time: '09:15 AM', user: 'Order #RE-10248' },
                { product: 'Sony WH-1000XM5', type: 'in', qty: 15, date: '2026-03-17', time: '02:45 PM', user: 'Supplier' },
                { product: 'DJI Mavic 3 Pro', type: 'out', qty: 2, date: '2026-03-17', time: '11:20 AM', user: 'Order #RE-10249' },
                { product: 'MacBook Pro 16', type: 'out', qty: 1, date: '2026-03-16', time: '03:30 PM', user: 'Order #RE-10250' }
            ];

            let html = '';
            movements.forEach(m => {
                html += `
                    <div class="movement-item">
                        <div class="movement-icon"><i class="fas ${m.type === 'in' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i></div>
                        <div class="movement-details">
                            <span class="movement-product">${m.product}</span>
                            <span class="movement-meta">${m.date} ${m.time} · ${m.user}</span>
                        </div>
                        <div class="movement-qty ${m.type === 'in' ? 'plus' : 'minus'}">
                            ${m.type === 'in' ? '+' : '-'}${m.qty}
                        </div>
                    </div>
                `;
            });
            document.getElementById('movementTimeline').innerHTML = html;
        }

        // pagination
        function renderPagination() {
            const totalPages = Math.ceil(filteredInventory.length / itemsPerPage);
            let paginationHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = paginationHtml;
        }

        window.goToPage = function(page) {
            currentPage = page;
            renderInventory();
        };

        // filter inventory
        window.filterInventory = function() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const stockFilter = document.getElementById('stockFilter').value;
            const supplierFilter = document.getElementById('supplierFilter').value;

            filteredInventory = inventoryData.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm) || 
                                    item.sku.toLowerCase().includes(searchTerm) ||
                                    item.supplier.toLowerCase().includes(searchTerm);
                const matchesStock = stockFilter === 'all' || item.status === stockFilter;
                const matchesSupplier = supplierFilter === 'all' || item.supplier.toLowerCase() === supplierFilter;
                return matchesSearch && matchesStock && matchesSupplier;
            });

            currentPage = 1;
            renderInventory();
            renderAlerts(); // update alerts based on filter? we keep original for demo
        };

        // restock modal
        window.openRestockModal = function(productId) {
            const product = inventoryData.find(p => p.id === productId);
            if (!product) return;

            document.getElementById('restockProductName').value = product.name;
            document.getElementById('restockCurrentStock').value = product.stock;
            document.getElementById('restockReorderPoint').value = product.reorderPoint;
            document.getElementById('restockSupplier').value = product.supplier;
            document.getElementById('restockModal').classList.add('active');
        };

        window.closeRestockModal = function() {
            document.getElementById('restockModal').classList.remove('active');
        };

        window.saveRestock = function() {
            const qty = parseInt(document.getElementById('restockQuantity').value);
            if (!qty || qty <= 0) {
                showToast('please enter valid quantity');
                return;
            }

            showToast(`✅ restock confirmed: +${qty} units`);
            closeRestockModal();
            
            // in real app would update data
            setTimeout(() => {
                showToast('inventory updated (demo)');
            }, 500);
        };

        // view product
        window.viewProduct = function(productId) {
            showToast(`🔍 viewing product details (demo)`);
        };

        // edit inventory
        window.editInventory = function(productId) {
            showToast(`✏️ edit inventory item (demo)`);
        };

        // tab switching
        function switchTab(tab) {
            showToast(`📊 switched to ${tab} panel (demo)`);
        }

        // toast
        window.showToast = function(msg) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2200);
        };

        // close modal on overlay click
        document.getElementById('restockModal').addEventListener('click', function(e) {
            if (e.target === this) closeRestockModal();
        });

        // prevent link clicks
        document.querySelectorAll('a[href="#"]').forEach(link => {
            link.addEventListener('click', (e) => e.preventDefault());
        });

        // initial render
        renderSummary();
        renderAlerts();
        renderInventory();
        renderMovements();

        // simulate stock update after 8 seconds
        setTimeout(() => {
            const item = inventoryData.find(p => p.id === 6); // AirPods
            if (item) {
                item.stock = 3;
                renderAlerts();
                renderInventory();
                showToast('⚠️ stock update: AirPods Pro 2 now low stock');
            }
        }, 8000);
    </script>
