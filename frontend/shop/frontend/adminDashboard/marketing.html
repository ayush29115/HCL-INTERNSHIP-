<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPTO · admin · marketing</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Chart.js for campaign analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f7fc;
            color: #1e293b;
        }

        /* admin layout */
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* sidebar (same as admin panel) */
        .admin-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0c1427 0%, #0f1a2f 100%);
            color: #eef3ff;
            padding: 32px 20px;
            border-right: 1px solid #2a3a5a;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 8px 0 24px rgba(0,0,0,0.06);
        }

        .admin-sidebar h2 {
            color: #ffb347;
            font-size: 2rem;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            font-weight: 700;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 20px;
        }

        .admin-sidebar h2 i {
            color: #ff9900;
            background: rgba(255,153,0,0.15);
            padding: 8px;
            border-radius: 14px;
        }

        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 22px;
            margin: 6px 0;
            border-radius: 16px;
            background: rgba(26, 38, 64, 0.6);
            border: 1px solid #2e3d5e;
            color: #dbecff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-nav-item i {
            color: #ff9900;
            width: 24px;
            font-size: 1.25rem;
        }

        .admin-nav-item:hover {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            transform: translateX(6px);
        }

        .admin-nav-item:hover i {
            color: #0b1425;
        }

        .admin-nav-item.active {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            font-weight: 600;
            box-shadow: 0 10px 18px -6px #ff9900;
        }

        .admin-nav-item.active i {
            color: #0b1425;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 36px;
            font-size: 0.8rem;
            color: #98a9c7;
            border-top: 1px dashed #2b3d60;
        }

        /* main content */
        .admin-main {
            flex: 1;
            padding: 36px 42px;
            background: #f4f7fc;
            overflow-y: auto;
        }

        /* top bar */
        .admin-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-top-bar h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            padding: 10px 24px 10px 20px;
            border-radius: 60px;
            border: 1px solid #dee9f5;
            box-shadow: 0 8px 18px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .admin-profile i {
            font-size: 2rem;
            color: #ff9900;
        }

        .admin-profile span {
            font-weight: 600;
        }

        /* date range picker */
        .date-range-picker {
            background: white;
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid #dee9f5;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .date-range-picker i {
            color: #ff9900;
        }

        /* marketing KPI cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.08);
        }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .kpi-title {
            color: #64748b;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            background: #ffeed9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9900;
        }

        .kpi-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0b1e42;
            margin-bottom: 4px;
        }

        .kpi-trend {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .trend-up { color: #22a65e; }
        .trend-down { color: #b91c1c; }

        /* action buttons */
        .action-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .primary-btn {
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .primary-btn:hover {
            background: #ffaa2a;
            transform: scale(1.02);
        }

        .secondary-btn {
            background: white;
            color: #0b1e42;
            border: 1px solid #d4e0f0;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .secondary-btn:hover {
            border-color: #ff9900;
        }

        /* campaigns grid */
        .campaigns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        .campaign-card {
            background: white;
            border-radius: 32px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.1);
            overflow: hidden;
            transition: 0.3s;
        }

        .campaign-card:hover {
            transform: translateY(-4px);
            border-color: #ff9900;
        }

        .campaign-header {
            padding: 24px;
            border-bottom: 1px solid #ecf3fe;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .campaign-status {
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .status-active { background: #e2f0e8; color: #1f7840; }
        .status-scheduled { background: #e0ecfe; color: #1960b3; }
        .status-ended { background: #ecf3fe; color: #64748b; }

        .campaign-body {
            padding: 24px;
        }

        .campaign-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0b1e42;
            margin-bottom: 8px;
        }

        .campaign-desc {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .campaign-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .metric-item {
            background: #f8fafd;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .metric-label {
            font-size: 0.7rem;
            color: #64748b;
        }

        .metric-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0b1e42;
        }

        .campaign-progress {
            margin: 16px 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf3fe;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ff9900;
            border-radius: 4px;
        }

        .campaign-footer {
            padding: 20px 24px;
            background: #f8fafd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* promotions table */
        .promotions-section {
            background: white;
            border-radius: 32px;
            border: 1px solid #ecf3fe;
            padding: 28px;
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .promo-table {
            width: 100%;
            border-collapse: collapse;
        }

        .promo-table th {
            text-align: left;
            padding: 16px 12px;
            color: #64748b;
            font-weight: 600;
            font-size: 0.8rem;
            border-bottom: 1px solid #ecf3fe;
        }

        .promo-table td {
            padding: 16px 12px;
            border-bottom: 1px solid #ecf3fe;
        }

        .promo-code {
            font-weight: 700;
            color: #ff9900;
            background: #ffeed9;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            font-size: 0.9rem;
        }

        .usage-badge {
            background: #e2f0e8;
            color: #1f7840;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        /* email campaigns */
        .email-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .email-card {
            background: white;
            border-radius: 28px;
            border: 1px solid #ecf3fe;
            padding: 24px;
            display: flex;
            gap: 16px;
        }

        .email-icon {
            width: 56px;
            height: 56px;
            background: #ffeed9;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9900;
            font-size: 1.5rem;
        }

        .email-content {
            flex: 1;
        }

        .email-title {
            font-weight: 700;
            color: #0b1e42;
            margin-bottom: 4px;
        }

        .email-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 0.8rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* seo section */
        .seo-section {
            background: white;
            border-radius: 32px;
            border: 1px solid #ecf3fe;
            padding: 28px;
            margin-bottom: 40px;
        }

        .seo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .seo-card {
            background: #f8fafd;
            border-radius: 24px;
            padding: 20px;
        }

        .seo-card h4 {
            font-weight: 600;
            color: #0b1e42;
            margin-bottom: 12px;
        }

        .seo-metric {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff9900;
            margin-bottom: 4px;
        }

        /* toast */
        .toast-message {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #0b1e42; color: white; padding: 16px 40px;
            border-radius: 60px; z-index: 3000; animation: fadeInOut 2.2s forwards;
            font-weight: 500; box-shadow: 0 20px 40px rgba(255,153,0,0.3);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -10px); }
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <h2><i class="fas fa-chart-line"></i> REPTO admin</h2>
            
            <div class="admin-nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-tachometer-alt"></i> dashboard
            </div>
            <div class="admin-nav-item" onclick="window.location.href='order.html'">
                <i class="fas fa-shopping-bag"></i> orders
            </div>
            <div class="admin-nav-item" onclick="window.location.href='product.html'">
                <i class="fas fa-boxes"></i> products
            </div>
            <div class="admin-nav-item" onclick="window.location.href='user.html'">
                <i class="fas fa-users"></i> users
            </div>
            <div class="admin-nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-pie"></i> analytics
            </div>
            <div class="admin-nav-item" onclick="window.location.href='inventory.html'">
                <i class="fas fa-warehouse"></i> inventory
            </div>
            <div class="admin-nav-item active" onclick="window.location.href='marketing.html'">
                <i class="fas fa-bullhorn"></i> marketing
            </div>
            <div class="admin-nav-item" onclick="window.location.href='setting.html'">
                <i class="fas fa-cog"></i> settings
            </div>

            <div class="sidebar-footer">
                <i class="fas fa-shield-alt"></i> admin · marketing
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="admin-main">
            <!-- top bar -->
            <div class="admin-top-bar">
                <h1><i class="fas fa-bullhorn" style="color:#ff9900;"></i> marketing</h1>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div class="date-range-picker" onclick="showToast('change date range')">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Mar 1 - Mar 19, 2026</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="admin-profile" onclick="showToast('admin profile')">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                    </div>
                </div>
            </div>

            <!-- marketing KPI cards -->
            <div class="kpi-grid" id="kpiGrid">
                <!-- filled by js -->
            </div>

            <!-- action buttons -->
            <div class="action-bar">
                <button class="primary-btn" onclick="showToast('create new campaign')">
                    <i class="fas fa-plus"></i> new campaign
                </button>
                <button class="primary-btn" onclick="showToast('create discount')">
                    <i class="fas fa-tag"></i> new discount
                </button>
                <button class="secondary-btn" onclick="showToast('email newsletter')">
                    <i class="fas fa-envelope"></i> email campaign
                </button>
                <button class="secondary-btn" onclick="showToast('export reports')">
                    <i class="fas fa-download"></i> export
                </button>
            </div>

            <!-- active campaigns -->
            <div class="campaigns-grid" id="campaignsGrid">
                <!-- filled by js -->
            </div>

            <!-- promotions & coupons -->
            <div class="promotions-section">
                <div class="section-header">
                    <h3><i class="fas fa-tags" style="color:#ff9900;"></i> active promotions & coupons</h3>
                    <button class="primary-btn" style="padding:10px 24px;" onclick="showToast('add new promo')">
                        <i class="fas fa-plus"></i> add promo
                    </button>
                </div>
                <table class="promo-table">
                    <thead>
                        <tr>
                            <th>code</th>
                            <th>discount</th>
                            <th>type</th>
                            <th>usage</th>
                            <th>valid until</th>
                            <th>status</th>
                            <th>actions</th>
                        </tr>
                    </thead>
                    <tbody id="promoTableBody">
                        <!-- filled by js -->
                    </tbody>
                </table>
            </div>

            <!-- email campaigns -->
            <div class="section-header">
                <h3><i class="fas fa-envelope-open-text" style="color:#ff9900;"></i> recent email campaigns</h3>
                <button class="secondary-btn" onclick="showToast('view all emails')">view all</button>
            </div>
            <div class="email-grid" id="emailGrid">
                <!-- filled by js -->
            </div>

            <!-- SEO & traffic -->
            <div class="seo-section">
                <div class="section-header">
                    <h3><i class="fas fa-chart-line" style="color:#ff9900;"></i> SEO & traffic overview</h3>
                    <button class="secondary-btn" onclick="showToast('view detailed SEO')">details</button>
                </div>
                <div class="seo-grid" id="seoGrid">
                    <!-- filled by js -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // ---------- MARKETING DATA ----------
        const marketingData = {
            kpis: [
                { title: 'campaign revenue', value: '₹12.4L', trend: '+15.3%', icon: 'fa-chart-line', trendUp: true },
                { title: 'conversion rate', value: '3.8%', trend: '+0.4%', icon: 'fa-percent', trendUp: true },
                { title: 'email open rate', value: '24.6%', trend: '+2.1%', icon: 'fa-envelope-open', trendUp: true },
                { title: 'click-through rate', value: '4.2%', trend: '-0.3%', icon: 'fa-mouse-pointer', trendUp: false },
                { title: 'new customers', value: '+245', trend: '+12.8%', icon: 'fa-user-plus', trendUp: true },
                { title: 'ROI', value: '324%', trend: '+18%', icon: 'fa-coins', trendUp: true }
            ],
            campaigns: [
                {
                    id: 1,
                    name: 'Summer Sale 2026',
                    desc: 'Up to 40% off on electronics',
                    status: 'active',
                    budget: 500000,
                    spent: 325000,
                    revenue: 1240000,
                    impressions: 245000,
                    clicks: 12300,
                    start: '2026-03-01',
                    end: '2026-03-31'
                },
                {
                    id: 2,
                    name: 'New Arrivals Launch',
                    desc: 'iPhone 15, S24 Ultra & more',
                    status: 'active',
                    budget: 300000,
                    spent: 187000,
                    revenue: 890000,
                    impressions: 156000,
                    clicks: 8900,
                    start: '2026-03-10',
                    end: '2026-03-25'
                },
                {
                    id: 3,
                    name: 'Weekend Flash Sale',
                    desc: '24-hour deals on audio',
                    status: 'scheduled',
                    budget: 150000,
                    spent: 0,
                    revenue: 0,
                    impressions: 0,
                    clicks: 0,
                    start: '2026-03-21',
                    end: '2026-03-22'
                }
            ],
            promos: [
                { code: 'SUMMER10', discount: '10% off', type: 'percentage', used: 345, limit: 500, valid: '2026-03-31', status: 'active' },
                { code: 'FLASH50', discount: '₹50 off', type: 'fixed', used: 128, limit: 200, valid: '2026-03-20', status: 'active' },
                { code: 'WELCOME20', discount: '20% off', type: 'percentage', used: 567, limit: 1000, valid: '2026-12-31', status: 'active' },
                { code: 'FREESHIP', discount: 'free shipping', type: 'shipping', used: 234, limit: 500, valid: '2026-03-25', status: 'active' }
            ],
            emails: [
                { title: 'Summer Sale starts now!', sent: 24500, opens: 6120, clicks: 1240, rate: '25%' },
                { title: 'New iPhone 15 is here', sent: 18900, opens: 5230, clicks: 980, rate: '27.7%' },
                { title: 'Weekend Flash Sale', sent: 21200, opens: 4980, clicks: 890, rate: '23.5%' }
            ],
            seo: [
                { metric: 'organic traffic', value: '18,420', change: '+12%' },
                { metric: 'keyword ranking', value: '#4.2', change: '+0.8' },
                { metric: 'backlinks', value: '1,847', change: '+156' },
                { metric: 'page speed', value: '1.2s', change: '-0.1s' }
            ]
        };

        // render KPI cards
        function renderKPIs() {
            const grid = document.getElementById('kpiGrid');
            let html = '';
            marketingData.kpis.forEach(kpi => {
                const trendClass = kpi.trendUp ? 'trend-up' : 'trend-down';
                const trendIcon = kpi.trendUp ? 'fa-arrow-up' : 'fa-arrow-down';
                html += `
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <span class="kpi-title">${kpi.title}</span>
                            <div class="kpi-icon"><i class="fas ${kpi.icon}"></i></div>
                        </div>
                        <div class="kpi-value">${kpi.value}</div>
                        <div class="kpi-trend ${trendClass}">
                            <i class="fas ${trendIcon}"></i> ${kpi.trend}
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // render campaigns
        function renderCampaigns() {
            const grid = document.getElementById('campaignsGrid');
            let html = '';
            marketingData.campaigns.forEach(campaign => {
                const spentPercent = (campaign.spent / campaign.budget) * 100;
                const roi = campaign.spent > 0 ? ((campaign.revenue - campaign.spent) / campaign.spent * 100).toFixed(0) : 0;
                const ctr = campaign.impressions > 0 ? ((campaign.clicks / campaign.impressions) * 100).toFixed(1) : 0;
                
                html += `
                    <div class="campaign-card">
                        <div class="campaign-header">
                            <span class="campaign-status status-${campaign.status}">${campaign.status}</span>
                            <span style="color:#64748b; font-size:0.8rem;">${campaign.start} to ${campaign.end}</span>
                        </div>
                        <div class="campaign-body">
                            <div class="campaign-title">${campaign.name}</div>
                            <div class="campaign-desc">${campaign.desc}</div>
                            <div class="campaign-metrics">
                                <div class="metric-item">
                                    <div class="metric-label">spent</div>
                                    <div class="metric-number">₹${(campaign.spent/1000).toFixed(0)}k</div>
                                </div>
                                <div class="metric-item">
                                    <div class="metric-label">revenue</div>
                                    <div class="metric-number">₹${(campaign.revenue/1000).toFixed(0)}k</div>
                                </div>
                                <div class="metric-item">
                                    <div class="metric-label">clicks</div>
                                    <div class="metric-number">${campaign.clicks}</div>
                                </div>
                                <div class="metric-item">
                                    <div class="metric-label">CTR</div>
                                    <div class="metric-number">${ctr}%</div>
                                </div>
                            </div>
                            <div class="campaign-progress">
                                <div class="progress-header">
                                    <span>budget usage</span>
                                    <span>₹${(campaign.spent/1000).toFixed(0)}k / ₹${(campaign.budget/1000).toFixed(0)}k</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${spentPercent}%"></div>
                                </div>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-top:12px;">
                                <span style="font-weight:600;">ROI: ${roi}%</span>
                                <span style="color:#64748b;">impressions: ${campaign.impressions.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="campaign-footer">
                            <button class="secondary-btn" style="padding:8px 20px;" onclick="showToast('view campaign ${campaign.id}')">view details</button>
                            <button class="primary-btn" style="padding:8px 20px;" onclick="showToast('edit campaign')">edit</button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // render promotions table
        function renderPromos() {
            const tbody = document.getElementById('promoTableBody');
            let html = '';
            marketingData.promos.forEach(promo => {
                const usagePercent = (promo.used / promo.limit * 100).toFixed(0);
                html += `
                    <tr>
                        <td><span class="promo-code">${promo.code}</span></td>
                        <td>${promo.discount}</td>
                        <td>${promo.type}</td>
                        <td>
                            <span class="usage-badge">${promo.used}/${promo.limit}</span>
                            <span style="font-size:0.7rem; margin-left:8px;">${usagePercent}%</span>
                        </td>
                        <td>${new Date(promo.valid).toLocaleDateString('en-IN')}</td>
                        <td><span class="status-badge status-active">active</span></td>
                        <td>
                            <button class="action-btn" style="padding:4px 12px;" onclick="showToast('edit promo')"><i class="fas fa-edit"></i></button>
                            <button class="action-btn outline" style="padding:4px 12px;" onclick="showToast('pause promo')"><i class="fas fa-pause"></i></button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // render email campaigns
        function renderEmails() {
            const grid = document.getElementById('emailGrid');
            let html = '';
            marketingData.emails.forEach(email => {
                html += `
                    <div class="email-card">
                        <div class="email-icon"><i class="fas fa-envelope"></i></div>
                        <div class="email-content">
                            <div class="email-title">${email.title}</div>
                            <div style="color:#64748b; font-size:0.8rem;">sent to ${email.sent.toLocaleString()} subscribers</div>
                            <div class="email-stats">
                                <span class="stat"><i class="fas fa-eye" style="color:#ff9900;"></i> ${email.opens} opens</span>
                                <span class="stat"><i class="fas fa-mouse-pointer" style="color:#ff9900;"></i> ${email.clicks} clicks</span>
                                <span class="stat"><i class="fas fa-percent" style="color:#ff9900;"></i> ${email.rate} open</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // render SEO section
        function renderSEO() {
            const grid = document.getElementById('seoGrid');
            let html = '';
            marketingData.seo.forEach(item => {
                html += `
                    <div class="seo-card">
                        <h4>${item.metric}</h4>
                        <div class="seo-metric">${item.value}</div>
                        <div style="color:${item.change.startsWith('+') ? '#22a65e' : '#b91c1c'};">
                            <i class="fas fa-arrow-${item.change.startsWith('+') ? 'up' : 'down'}"></i> ${item.change}
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // tab switching (demo)
        function switchTab(tab) {
            showToast(`📊 switched to ${tab} panel (demo)`);
        }

        // toast
        window.showToast = function(msg) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2200);
        };

        // prevent link clicks
        document.querySelectorAll('a[href="#"]').forEach(link => {
            link.addEventListener('click', (e) => e.preventDefault());
        });

        // initial render
        renderKPIs();
        renderCampaigns();
        renderPromos();
        renderEmails();
        renderSEO();

        // simulate campaign update after 8 seconds
        setTimeout(() => {
            marketingData.campaigns[0].spent += 25000;
            marketingData.campaigns[0].revenue += 85000;
            renderCampaigns();
            showToast('📊 campaign data updated: Summer Sale');
        }, 8000);
    </script>
</body>
</html>
