<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPTO · admin panel · dashboard</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f0f4fa;
            color: #1e293b;
        }

        /* admin layout */
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* ---------- SIDEBAR (dark professional) ---------- */
        .admin-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0c1427 0%, #0f1a2f 100%);
            color: #eef3ff;
            padding: 32px 20px;
            border-right: 1px solid #2a3a5a;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 8px 0 24px rgba(0,0,0,0.06);
        }

        .admin-sidebar h2 {
            color: #ffb347;
            font-size: 2rem;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            font-weight: 700;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 20px;
        }

        .admin-sidebar h2 i {
            color: #ff9900;
            background: rgba(255,153,0,0.15);
            padding: 8px;
            border-radius: 14px;
        }

        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 22px;
            margin: 6px 0;
            border-radius: 16px;
            background: rgba(26, 38, 64, 0.6);
            border: 1px solid #2e3d5e;
            color: #dbecff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-nav-item i {
            color: #ff9900;
            width: 24px;
            font-size: 1.25rem;
        }

        .admin-nav-item:hover {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            transform: translateX(6px);
        }

        .admin-nav-item:hover i {
            color: #0b1425;
        }

        .admin-nav-item.active {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            font-weight: 600;
            box-shadow: 0 10px 18px -6px #ff9900;
        }

        .admin-nav-item.active i {
            color: #0b1425;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 36px;
            font-size: 0.8rem;
            color: #98a9c7;
            border-top: 1px dashed #2b3d60;
        }

        /* ---------- MAIN CONTENT ---------- */
        .admin-main {
            flex: 1;
            padding: 36px 42px;
            background: #f4f7fc;
            overflow-y: auto;
        }

        /* top bar */
        .admin-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-top-bar h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            padding: 10px 24px 10px 20px;
            border-radius: 60px;
            border: 1px solid #dee9f5;
            box-shadow: 0 8px 18px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .admin-profile i {
            font-size: 2rem;
            color: #ff9900;
        }

        .admin-profile span {
            font-weight: 600;
        }

        /* date range picker */
        .date-range {
            background: white;
            padding: 12px 28px;
            border-radius: 60px;
            border: 1px solid #dee9f5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* metric cards */
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 26px;
            margin-bottom: 40px;
        }

        .metric-card {
            background: white;
            border-radius: 28px;
            padding: 24px 22px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.08);
            display: flex;
            align-items: center;
            gap: 18px;
            transition: 0.2s;
        }

        .metric-card:hover {
            border-color: #ff9900;
            transform: translateY(-4px);
        }

        .metric-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(145deg, #ffe6c7, #ffd6a0);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #ff9900;
        }

        .metric-content h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #566f8f;
        }

        .metric-content .value {
            font-size: 2rem;
            font-weight: 800;
            color: #0b1e42;
            line-height: 1.2;
        }

        .metric-trend {
            font-size: 0.8rem;
            color: #22a65e;
            background: #e0ffea;
            padding: 2px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
        }

        /* charts row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.08);
        }

        .chart-card h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #0b1e42;
        }

        .chart-container {
            height: 250px;
            position: relative;
        }

        /* tables and panels */
        .panel-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 28px;
            margin-bottom: 40px;
        }

        .panel {
            background: white;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.08);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .view-all {
            color: #ff9900;
            font-weight: 600;
            cursor: pointer;
        }

        /* orders table */
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table th {
            text-align: left;
            padding: 14px 8px;
            color: #566f8f;
            font-weight: 600;
            font-size: 0.8rem;
            border-bottom: 1px solid #ecf3fe;
        }

        .orders-table td {
            padding: 16px 8px;
            border-bottom: 1px solid #ecf3fe;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .status-delivered { background: #e2f0e8; color: #1f7840; }
        .status-processing { background: #fff2d9; color: #b45b0a; }
        .status-shipped { background: #e0ecfe; color: #1960b3; }
        .status-cancelled { background: #ffe6e6; color: #b32626; }

        /* product list */
        .product-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #ecf3fe;
        }

        .product-img {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            background-color: #eaf0f8;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
        }

        .product-stock {
            font-size: 0.8rem;
            color: #64748b;
        }

        .stock-low { color: #b91c1c; font-weight: 600; }

        /* quick actions */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .action-btn {
            background: #f0f5ff;
            border: 1px solid #d4e0f0;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #ff9900;
            color: #0b1e42;
        }

        /* toast */
        .toast-message {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #0b1e42; color: white; padding: 16px 40px;
            border-radius: 60px; z-index: 3000; animation: fadeInOut 2.2s forwards;
            font-weight: 500; box-shadow: 0 20px 40px rgba(255,153,0,0.3);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -10px); }
        }

        /* modal for add/edit */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 36px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <h2><i class="fas fa-chart-line"></i> REPTO admin</h2>
            
            <div class="admin-nav-item active" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-tachometer-alt"></i> dashboard
            </div>
            <div class="admin-nav-item" onclick="window.location.href='order.html'">
                <i class="fas fa-shopping-bag"></i> orders
            </div>
            <div class="admin-nav-item" onclick="window.location.href='product.html'">
                <i class="fas fa-boxes"></i> products
            </div>
            <div class="admin-nav-item" onclick="window.location.href='user.html'">
                <i class="fas fa-users"></i> users
            </div>
            <div class="admin-nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-pie"></i> analytics
            </div>
            <div class="admin-nav-item" onclick="window.location.href='inventory.html'">
                <i class="fas fa-warehouse"></i> inventory
            </div>
            <div class="admin-nav-item" onclick="window.location.href='marketing.html'">
                <i class="fas fa-bullhorn"></i> marketing
            </div>
            <div class="admin-nav-item" onclick="window.location.href='setting.html'">
                <i class="fas fa-cog"></i> settings
            </div>

            <div class="sidebar-footer">
                <i class="fas fa-shield-alt"></i> admin · v2.8 · store live
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="admin-main">
            <!-- top bar -->
            <div class="admin-top-bar">
                <h1><i class="fas fa-crown" style="color:#ff9900;"></i> admin dashboard</h1>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div class="date-range">
                        <i class="fas fa-calendar" style="color:#ff9900;"></i>
                        <span>Mar 1 - Mar 19, 2026</span>
                        <i class="fas fa-chevron-down" style="font-size:0.8rem;"></i>
                    </div>
                    <div class="admin-profile" onclick="showToast('admin profile')">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                    </div>
                </div>
            </div>

            <!-- METRIC CARDS (dynamic) -->
            <div class="metric-grid" id="metricGrid">
                <!-- filled via js -->
            </div>

            <!-- CHARTS ROW -->
            <div class="charts-row">
                <div class="chart-card">
                    <h3><i class="fas fa-chart-line" style="color:#ff9900;"></i> weekly sales</h3>
                    <div class="chart-container">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-chart-pie" style="color:#ff9900;"></i> category breakdown</h3>
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- PANELS ROW -->
            <div class="panel-row">
                <!-- recent orders -->
                <div class="panel">
                    <div class="panel-header">
                        <h3><i class="fas fa-clock"></i> recent orders</h3>
                        <span class="view-all" onclick="showToast('view all orders')">view all <i class="fas fa-arrow-right"></i></span>
                    </div>
                    <table class="orders-table" id="ordersTable">
                        <!-- dynamic -->
                    </table>
                </div>

                <!-- low stock alert + quick actions -->
                <div class="panel">
                    <div class="panel-header">
                        <h3><i class="fas fa-exclamation-triangle" style="color:#ff9900;"></i> inventory alerts</h3>
                        <span class="view-all" onclick="showToast('manage inventory')">manage</span>
                    </div>
                    <div id="lowStockList">
                        <!-- dynamic -->
                    </div>

                    <div style="margin-top: 24px;">
                        <h3 style="font-size:1rem; margin-bottom:16px;">quick actions</h3>
                        <div class="action-buttons">
                            <button class="action-btn" onclick="showToast('➕ add product')"><i class="fas fa-plus"></i> add product</button>
                            <button class="action-btn" onclick="showToast('📦 restock')"><i class="fas fa-truck"></i> restock</button>
                            <button class="action-btn" onclick="showToast('🏷️ new category')"><i class="fas fa-tag"></i> category</button>
                            <button class="action-btn" onclick="showToast('📊 export report')"><i class="fas fa-file-export"></i> export</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- top products panel -->
            <div class="panel" style="margin-top:20px;">
                <div class="panel-header">
                    <h3><i class="fas fa-fire"></i> top selling products</h3>
                    <span class="view-all" onclick="showToast('view all products')">view all</span>
                </div>
                <div id="topProductsList" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                    <!-- dynamic -->
                </div>
            </div>
        </main>
    </div>

    <!-- toast function -->
   <script>
const API_URL = "http://localhost:5000/api";

// ---------- LOAD ALL DATA ----------
async function loadDashboard() {
    try {
        const metricsRes = await fetch(`${API_URL}/metrics`);
        const ordersRes = await fetch(`${API_URL}/orders`);
        const productsRes = await fetch(`${API_URL}/products`);

        const metrics = await metricsRes.json();
        const orders = await ordersRes.json();
        const products = await productsRes.json();

        renderMetrics(metrics);
        renderOrders(orders);
        renderLowStock(products);
        renderTopProducts(products);

    } catch (err) {
        console.error(err);
    }
}

// ---------- METRICS ----------
function renderMetrics(m) {
    document.getElementById('metricGrid').innerHTML = `
        <div class="metric-card">
            <div class="metric-icon"><i class="fas fa-dollar-sign"></i></div>
            <div class="metric-content">
                <h3>revenue</h3>
                <div class="value">₹${m.revenue || 0}</div>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-icon"><i class="fas fa-shopping-cart"></i></div>
            <div class="metric-content">
                <h3>orders</h3>
                <div class="value">${m.orders || 0}</div>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-icon"><i class="fas fa-users"></i></div>
            <div class="metric-content">
                <h3>customers</h3>
                <div class="value">${m.customers || 0}</div>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-icon"><i class="fas fa-box"></i></div>
            <div class="metric-content">
                <h3>products</h3>
                <div class="value">${m.products || 0}</div>
            </div>
        </div>
    `;
}

// ---------- ORDERS ----------
function renderOrders(orders) {
    let html = `<tr><th>order ID</th><th>customer</th><th>amount</th><th>status</th></tr>`;

    orders.forEach(o => {
        html += `
            <tr>
                <td>${o._id || ''}</td>
                <td>${o.customer || ''}</td>
                <td>₹${o.amount || 0}</td>
                <td><span class="status-badge status-${o.status}">${o.status}</span></td>
            </tr>
        `;
    });

    document.getElementById('ordersTable').innerHTML = html;
}

// ---------- LOW STOCK ----------
function renderLowStock(products) {
    let html = '';

    products
        .filter(p => p.stock && p.stock < 10)
        .forEach(p => {
            html += `
                <div class="product-item">
                    <div class="product-img" style="background-image:url('${p.image || ''}')"></div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-stock stock-low">stock: ${p.stock}</div>
                    </div>
                </div>
            `;
        });

    document.getElementById('lowStockList').innerHTML = html;
}

// ---------- TOP PRODUCTS ----------
function renderTopProducts(products) {
    let html = '';

    products.slice(0, 4).forEach(p => {
        html += `
            <div style="background:#f8fafd; border-radius:24px; padding:16px;">
                <div style="display:flex; gap:16px;">
                    <div style="width:60px; height:60px; background-image:url('${p.image}'); background-size:cover;"></div>
                    <div>
                        <div style="font-weight:700;">${p.name}</div>
                        <div style="color:#64748b;">₹${p.price}</div>
                    </div>
                </div>
            </div>
        `;
    });

    document.getElementById('topProductsList').innerHTML = html;
}

// ---------- INIT ----------
loadDashboard();
</script>
</body>
</html>
