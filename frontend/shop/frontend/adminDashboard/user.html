<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPTO · admin · user management</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f7fc;
            color: #1e293b;
        }

        /* admin layout */
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* sidebar (same as admin panel) */
        .admin-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0c1427 0%, #0f1a2f 100%);
            color: #eef3ff;
            padding: 32px 20px;
            border-right: 1px solid #2a3a5a;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 8px 0 24px rgba(0,0,0,0.06);
        }

        .admin-sidebar h2 {
            color: #ffb347;
            font-size: 2rem;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            font-weight: 700;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 20px;
        }

        .admin-sidebar h2 i {
            color: #ff9900;
            background: rgba(255,153,0,0.15);
            padding: 8px;
            border-radius: 14px;
        }

        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 22px;
            margin: 6px 0;
            border-radius: 16px;
            background: rgba(26, 38, 64, 0.6);
            border: 1px solid #2e3d5e;
            color: #dbecff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-nav-item i {
            color: #ff9900;
            width: 24px;
            font-size: 1.25rem;
        }

        .admin-nav-item:hover {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            transform: translateX(6px);
        }

        .admin-nav-item:hover i {
            color: #0b1425;
        }

        .admin-nav-item.active {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            font-weight: 600;
            box-shadow: 0 10px 18px -6px #ff9900;
        }

        .admin-nav-item.active i {
            color: #0b1425;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 36px;
            font-size: 0.8rem;
            color: #98a9c7;
            border-top: 1px dashed #2b3d60;
        }

        /* main content */
        .admin-main {
            flex: 1;
            padding: 36px 42px;
            background: #f4f7fc;
            overflow-y: auto;
        }

        /* top bar */
        .admin-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-top-bar h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            padding: 10px 24px 10px 20px;
            border-radius: 60px;
            border: 1px solid #dee9f5;
            box-shadow: 0 8px 18px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .admin-profile i {
            font-size: 2rem;
            color: #ff9900;
        }

        .admin-profile span {
            font-weight: 600;
        }

        /* add user button */
        .add-user-btn {
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            border: 1px solid #ff9900;
            transition: 0.2s;
        }

        .add-user-btn:hover {
            background: #ffaa2a;
            transform: scale(1.02);
        }

        /* filters bar */
        .filters-bar {
            background: white;
            border-radius: 80px;
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 8px 22px rgba(0,0,0,0.02);
        }

        .search-box {
            flex: 2;
            min-width: 280px;
            display: flex;
            align-items: center;
            background: #f8fafd;
            border-radius: 60px;
            padding: 0 20px;
            border: 1px solid #d4e0f0;
        }

        .search-box i {
            color: #ff9900;
        }

        .search-box input {
            flex: 1;
            padding: 14px 16px;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #d4e0f0;
            background: white;
            font-weight: 500;
            color: #0b1e42;
            cursor: pointer;
            outline: none;
        }

        /* users table */
        .users-table-container {
            background: white;
            border-radius: 32px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.1);
            overflow: auto;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        .users-table th {
            text-align: left;
            padding: 22px 20px;
            background: #f8fafd;
            color: #0b1e42;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid #ecf3fe;
        }

        .users-table td {
            padding: 20px;
            border-bottom: 1px solid #ecf3fe;
            color: #1e293b;
        }

        .users-table tbody tr {
            cursor: pointer;
            transition: 0.15s;
        }

        .users-table tbody tr:hover {
            background: #fff9f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ffeed9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9900;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 700;
            color: #0b1e42;
        }

        .user-email {
            font-size: 0.8rem;
            color: #64748b;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-block;
        }

        .status-active { background: #e2f0e8; color: #1f7840; }
        .status-inactive { background: #ffe6e6; color: #b32626; }
        .status-pending { background: #fff2d9; color: #b45b0a; }

        .role-badge {
            background: #f0f5ff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .role-admin { background: #0b1e42; color: white; }

        .action-btn {
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 8px;
        }

        .action-btn.outline {
            background: transparent;
            border: 1px solid #ff9900;
        }

        /* modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
            background: #f0f5ff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #ff9900;
            color: white;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0b1e42;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #0b1e42;
            margin-bottom: 8px;
            display: block;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #d4e0f0;
            border-radius: 60px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #ff9900;
            box-shadow: 0 0 0 3px rgba(255,153,0,0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .save-btn {
            flex: 1;
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            background: #f0f5ff;
            color: #64748b;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
        }

        /* user detail view */
        .user-detail-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 28px;
        }

        .user-detail-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ffeed9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9900;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .user-detail-info h2 {
            font-size: 1.8rem;
            color: #0b1e42;
            margin-bottom: 4px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 28px;
        }

        .detail-section {
            background: #f8fafd;
            border-radius: 28px;
            padding: 24px;
        }

        .detail-section h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #ecf3fe;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .orders-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #ecf3fe;
        }

        /* pagination */
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 24px;
        }

        .page-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #d4e0f0;
            background: white;
            cursor: pointer;
            font-weight: 600;
        }

        .page-btn.active {
            background: #ff9900;
            color: #0b1e42;
            border-color: #ff9900;
        }

        /* toast */
        .toast-message {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #0b1e42; color: white; padding: 16px 40px;
            border-radius: 60px; z-index: 3000; animation: fadeInOut 2.2s forwards;
            font-weight: 500; box-shadow: 0 20px 40px rgba(255,153,0,0.3);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -10px); }
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <h2><i class="fas fa-chart-line"></i> REPTO admin</h2>
            
            <div class="admin-nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-tachometer-alt"></i> dashboard
            </div>
            <div class="admin-nav-item" onclick="window.location.href='order.html'">
                <i class="fas fa-shopping-bag"></i> orders
            </div>
            <div class="admin-nav-item" onclick="window.location.href='product.html'">
                <i class="fas fa-boxes"></i> products
            </div>
            <div class="admin-nav-item active" onclick="window.location.href='user.html'">
                <i class="fas fa-users"></i> users
            </div>
            <div class="admin-nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-pie"></i> analytics
            </div>
            <div class="admin-nav-item" onclick="window.location.href='inventory.html'">
                <i class="fas fa-warehouse"></i> inventory
            </div>
            <div class="admin-nav-item" onclick="window.location.href='marketing.html'">
                <i class="fas fa-bullhorn"></i> marketing
            </div>
            <div class="admin-nav-item" onclick="window.location.href='setting.html'">
                <i class="fas fa-cog"></i> settings
            </div>

            <div class="sidebar-footer">
                <i class="fas fa-shield-alt"></i> admin · user management
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="admin-main">
            <!-- top bar -->
            <div class="admin-top-bar">
                <h1><i class="fas fa-users" style="color:#ff9900;"></i> users</h1>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div class="admin-profile" onclick="showToast('admin profile')">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                    </div>
                </div>
            </div>

            <!-- add user button -->
            <button class="add-user-btn" onclick="openAddUserModal()">
                <i class="fas fa-user-plus"></i> add new user
            </button>

            <!-- filters -->
            <div class="filters-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="search users by name, email, phone..." id="searchInput" onkeyup="filterUsers()">
                </div>
                <div class="filter-group">
                    <select class="filter-select" id="statusFilter" onchange="filterUsers()">
                        <option value="all">all status</option>
                        <option value="active">active</option>
                        <option value="inactive">inactive</option>
                        <option value="pending">pending</option>
                    </select>
                    <select class="filter-select" id="roleFilter" onchange="filterUsers()">
                        <option value="all">all roles</option>
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                        <option value="moderator">moderator</option>
                    </select>
                </div>
            </div>

            <!-- users table -->
            <div class="users-table-container">
                <table class="users-table" id="usersTable">
                    <thead>
                        <tr>
                            <th>user</th>
                            <th>contact</th>
                            <th>location</th>
                            <th>orders</th>
                            <th>spent</th>
                            <th>status</th>
                            <th>role</th>
                            <th>joined</th>
                            <th>actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- filled by js -->
                    </tbody>
                </table>
            </div>

            <!-- pagination -->
            <div class="pagination" id="pagination">
                <!-- filled by js -->
            </div>
        </main>
    </div>

    <!-- user modal (add/edit) -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></div>
            <div class="modal-title" id="modalTitle">add new user</div>
            
            <form id="userForm" onsubmit="event.preventDefault(); saveUser();">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">first name</label>
                        <input type="text" class="form-input" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">last name</label>
                        <input type="text" class="form-input" id="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">email</label>
                    <input type="email" class="form-input" id="email" required>
                </div>

                <div class="form-group">
                    <label class="form-label">phone</label>
                    <input type="tel" class="form-input" id="phone" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">city</label>
                        <input type="text" class="form-input" id="city">
                    </div>
                    <div class="form-group">
                        <label class="form-label">state</label>
                        <input type="text" class="form-input" id="state">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">status</label>
                        <select class="form-select" id="status">
                            <option value="active">active</option>
                            <option value="inactive">inactive</option>
                            <option value="pending">pending</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">role</label>
                        <select class="form-select" id="role">
                            <option value="user">user</option>
                            <option value="admin">admin</option>
                            <option value="moderator">moderator</option>
                        </select>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="emailVerified">
                    <label for="emailVerified">email verified</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="phoneVerified">
                    <label for="phoneVerified">phone verified</label>
                </div>

                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">cancel</button>
                    <button type="submit" class="save-btn">save user</button>
                </div>
            </form>
        </div>
    </div>

    <!-- user detail modal -->
    <div class="modal-overlay" id="userDetailModal">
        <div class="modal-content" id="userDetailContent">
            <!-- dynamic content -->
        </div>
    </div>

    <script>
const API_URL = "http://localhost:5000/api/users";

let usersData = [];
let currentPage = 1;
const itemsPerPage = 5;
let filteredUsers = [];
let editingUserId = null;

// ---------- FETCH USERS ----------
async function loadUsers() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        usersData = data;
        filteredUsers = [...usersData];

        renderUsers();

    } catch (err) {
        console.error(err);
        document.getElementById('usersTableBody').innerHTML =
            "<tr><td colspan='9'>Error loading users</td></tr>";
    }
}

// ---------- RENDER USERS ----------
function renderUsers() {
    const tbody = document.getElementById('usersTableBody');

    const start = (currentPage - 1) * itemsPerPage;
    const pageUsers = filteredUsers.slice(start, start + itemsPerPage);

    if (!pageUsers.length) {
        tbody.innerHTML = "<tr><td colspan='9'>No users found</td></tr>";
        return;
    }

    let html = '';

    pageUsers.forEach(user => {
        const fullName = user.name || "No Name";
        const initials = fullName.split(" ").map(n => n[0]).join("");

        html += `
            <tr>
                <td>
                    <div class="user-info">
                        <div class="user-avatar">${initials}</div>
                        <div class="user-details">
                            <span class="user-name">${fullName}</span>
                            <span class="user-email">${user.email}</span>
                        </div>
                    </div>
                </td>
                <td>${user.phone || '-'}</td>
                <td>${user.city || '-'}</td>
                <td>${user.orders || 0}</td>
                <td>₹${user.spent || 0}</td>
                <td><span class="status-badge status-${user.status || 'active'}">${user.status || 'active'}</span></td>
                <td><span class="role-badge">${user.role || 'user'}</span></td>
                <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : '-'}</td>
                <td>-</td>
            </tr>
        `;
    });

    tbody.innerHTML = html;
}

// ---------- FILTER ----------
window.filterUsers = function() {
    const search = document.getElementById('searchInput').value.toLowerCase();

    filteredUsers = usersData.filter(u =>
        (u.name || '').toLowerCase().includes(search) ||
        (u.email || '').toLowerCase().includes(search)
    );

    currentPage = 1;
    renderUsers();
};

// ---------- INIT ----------
loadUsers();
</script>
</body>
</html>
