<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPTO · admin · order management</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f7fc;
            color: #1e293b;
        }

        /* admin layout */
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* sidebar (same as admin panel) */
        .admin-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0c1427 0%, #0f1a2f 100%);
            color: #eef3ff;
            padding: 32px 20px;
            border-right: 1px solid #2a3a5a;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 8px 0 24px rgba(0,0,0,0.06);
        }

        .admin-sidebar h2 {
            color: #ffb347;
            font-size: 2rem;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            font-weight: 700;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 20px;
        }

        .admin-sidebar h2 i {
            color: #ff9900;
            background: rgba(255,153,0,0.15);
            padding: 8px;
            border-radius: 14px;
        }

        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 22px;
            margin: 6px 0;
            border-radius: 16px;
            background: rgba(26, 38, 64, 0.6);
            border: 1px solid #2e3d5e;
            color: #dbecff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-nav-item i {
            color: #ff9900;
            width: 24px;
            font-size: 1.25rem;
        }

        .admin-nav-item:hover {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            transform: translateX(6px);
        }

        .admin-nav-item:hover i {
            color: #0b1425;
        }

        .admin-nav-item.active {
            background: #ff9900;
            color: #0b1425;
            border-color: #ff9900;
            font-weight: 600;
            box-shadow: 0 10px 18px -6px #ff9900;
        }

        .admin-nav-item.active i {
            color: #0b1425;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 36px;
            font-size: 0.8rem;
            color: #98a9c7;
            border-top: 1px dashed #2b3d60;
        }

        /* main content */
        .admin-main {
            flex: 1;
            padding: 36px 42px;
            background: #f4f7fc;
            overflow-y: auto;
        }

        /* top bar */
        .admin-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-top-bar h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            padding: 10px 24px 10px 20px;
            border-radius: 60px;
            border: 1px solid #dee9f5;
            box-shadow: 0 8px 18px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .admin-profile i {
            font-size: 2rem;
            color: #ff9900;
        }

        .admin-profile span {
            font-weight: 600;
        }

        /* filters bar */
        .filters-bar {
            background: white;
            border-radius: 80px;
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 8px 22px rgba(0,0,0,0.02);
        }

        .search-box {
            flex: 2;
            min-width: 280px;
            display: flex;
            align-items: center;
            background: #f8fafd;
            border-radius: 60px;
            padding: 0 20px;
            border: 1px solid #d4e0f0;
        }

        .search-box i {
            color: #ff9900;
        }

        .search-box input {
            flex: 1;
            padding: 14px 16px;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #d4e0f0;
            background: white;
            font-weight: 500;
            color: #0b1e42;
            cursor: pointer;
            outline: none;
        }

        .date-range {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafd;
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid #d4e0f0;
        }

        /* orders table */
        .orders-table-container {
            background: white;
            border-radius: 32px;
            border: 1px solid #ecf3fe;
            box-shadow: 0 18px 40px -14px rgba(0,10,30,0.1);
            overflow: auto;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        .orders-table th {
            text-align: left;
            padding: 22px 20px;
            background: #f8fafd;
            color: #0b1e42;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid #ecf3fe;
        }

        .orders-table td {
            padding: 20px;
            border-bottom: 1px solid #ecf3fe;
            color: #1e293b;
        }

        .orders-table tbody tr {
            cursor: pointer;
            transition: 0.15s;
        }

        .orders-table tbody tr:hover {
            background: #fff9f0;
        }

        .order-id {
            font-weight: 700;
            color: #ff9900;
        }

        .customer-info {
            display: flex;
            flex-direction: column;
        }

        .customer-name {
            font-weight: 600;
        }

        .customer-email {
            font-size: 0.8rem;
            color: #64748b;
        }

        .status-badge {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
        }

        .status-delivered { background: #e2f0e8; color: #1f7840; }
        .status-processing { background: #fff2d9; color: #b45b0a; }
        .status-shipped { background: #e0ecfe; color: #1960b3; }
        .status-cancelled { background: #ffe6e6; color: #b32626; }
        .status-refunded { background: #e6e6fa; color: #5a3e8a; }

        .payment-badge {
            background: #f0f5ff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .action-btn {
            background: #ff9900;
            color: #0b1e42;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 8px;
        }

        .action-btn.outline {
            background: transparent;
            border: 1px solid #ff9900;
        }

        /* order detail modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
            background: #f0f5ff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #ff9900;
            color: white;
        }

        .order-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .order-detail-id {
            font-size: 2rem;
            font-weight: 700;
            color: #0b1e42;
        }

        .order-detail-status {
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 700;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 28px;
        }

        .detail-section {
            background: #f8fafd;
            border-radius: 28px;
            padding: 24px;
        }

        .detail-section h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #0b1e42;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #ecf3fe;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .product-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid #ecf3fe;
        }

        .product-img {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            background-color: #eaf0f8;
        }

        .product-details {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
        }

        .product-sku {
            font-size: 0.7rem;
            color: #64748b;
        }

        .update-status {
            margin-top: 28px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-select {
            flex: 1;
            padding: 16px 24px;
            border-radius: 60px;
            border: 1px solid #d4e0f0;
            font-size: 1rem;
        }

        /* toast */
        .toast-message {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #0b1e42; color: white; padding: 16px 40px;
            border-radius: 60px; z-index: 3000; animation: fadeInOut 2.2s forwards;
            font-weight: 500; box-shadow: 0 20px 40px rgba(255,153,0,0.3);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -10px); }
        }

        /* pagination */
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 24px;
        }

        .page-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #d4e0f0;
            background: white;
            cursor: pointer;
            font-weight: 600;
        }

        .page-btn.active {
            background: #ff9900;
            color: #0b1e42;
            border-color: #ff9900;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <h2><i class="fas fa-chart-line"></i> REPTO admin</h2>
            
            <div class="admin-nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-tachometer-alt"></i> dashboard
            </div>
            <div class="admin-nav-item active" onclick="window.location.href='order.html'">
                <i class="fas fa-shopping-bag"></i> orders
            </div>
            <div class="admin-nav-item" onclick="window.location.href='product.html'">
                <i class="fas fa-boxes"></i> products
            </div>
            <div class="admin-nav-item" onclick="window.location.href='user.html'">
                <i class="fas fa-users"></i> users
            </div>
            <div class="admin-nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-pie"></i> analytics
            </div>
            <div class="admin-nav-item" onclick="window.location.href='inventory.html'">
                <i class="fas fa-warehouse"></i> inventory
            </div>
            <div class="admin-nav-item" onclick="window.location.href='marketing.html'">
                <i class="fas fa-bullhorn"></i> marketing
            </div>
            <div class="admin-nav-item" onclick="window.location.href='setting.html'">
                <i class="fas fa-cog"></i> settings
            </div>

            <div class="sidebar-footer">
                <i class="fas fa-shield-alt"></i> admin · order management
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="admin-main">
            <!-- top bar -->
            <div class="admin-top-bar">
                <h1><i class="fas fa-shopping-bag" style="color:#ff9900;"></i> orders</h1>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div class="admin-profile" onclick="showToast('admin profile')">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                    </div>
                </div>
            </div>

            <!-- filters -->
            <div class="filters-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="search by order ID, customer, email..." id="searchInput" onkeyup="filterOrders()">
                </div>
                <div class="filter-group">
                    <select class="filter-select" id="statusFilter" onchange="filterOrders()">
                        <option value="all">all status</option>
                        <option value="processing">processing</option>
                        <option value="shipped">shipped</option>
                        <option value="delivered">delivered</option>
                        <option value="cancelled">cancelled</option>
                        <option value="refunded">refunded</option>
                    </select>
                    <select class="filter-select" id="paymentFilter" onchange="filterOrders()">
                        <option value="all">all payment</option>
                        <option value="paid">paid</option>
                        <option value="pending">pending</option>
                        <option value="failed">failed</option>
                    </select>
                    <div class="date-range">
                        <i class="fas fa-calendar" style="color:#ff9900;"></i>
                        <span>last 30 days</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <!-- orders table -->
            <div class="orders-table-container">
                <table class="orders-table" id="ordersTable">
                    <thead>
                        <tr>
                            <th>order ID</th>
                            <th>date</th>
                            <th>customer</th>
                            <th>items</th>
                            <th>total</th>
                            <th>payment</th>
                            <th>status</th>
                            <th>actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <!-- filled by js -->
                    </tbody>
                </table>
            </div>

            <!-- pagination -->
            <div class="pagination" id="pagination">
                <!-- filled by js -->
            </div>
        </main>
    </div>

    <!-- order detail modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal-content" id="orderModalContent">
            <!-- dynamic content -->
        </div>
    </div>

   <script>
const API_URL = "http://localhost:5000/api/orders";

let ordersData = [];
let currentPage = 1;
const rowsPerPage = 5;
let filteredOrders = [];

// ---------- FETCH ORDERS ----------
async function loadOrders() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        ordersData = data;
        filteredOrders = [...ordersData];

        renderOrders();

    } catch (err) {
        console.error(err);
        document.getElementById('ordersTableBody').innerHTML =
            "<tr><td colspan='8'>Error loading orders</td></tr>";
    }
}

// ---------- RENDER ----------
function renderOrders() {
    const tbody = document.getElementById('ordersTableBody');

    const start = (currentPage - 1) * rowsPerPage;
    const pageOrders = filteredOrders.slice(start, start + rowsPerPage);

    if (!pageOrders.length) {
        tbody.innerHTML = "<tr><td colspan='8'>No orders found</td></tr>";
        return;
    }

    let html = '';

    pageOrders.forEach(order => {
        html += `
            <tr>
                <td><span class="order-id">${order._id}</span></td>
                <td>${order.createdAt ? new Date(order.createdAt).toLocaleDateString() : '-'}</td>
                <td>
                    <div class="customer-info">
                        <span class="customer-name">${order.customerName || ''}</span>
                        <span class="customer-email">${order.customerEmail || ''}</span>
                    </div>
                </td>
                <td>${order.items?.length || 0}</td>
                <td>₹${order.total || 0}</td>
                <td>
                    <span class="payment-badge">${order.paymentMethod || ''}</span><br>
                    <span style="font-size:0.7rem;">${order.paymentStatus || ''}</span>
                </td>
                <td><span class="status-badge status-${order.status}">${order.status}</span></td>
                <td>-</td>
            </tr>
        `;
    });

    tbody.innerHTML = html;
}

// ---------- FILTER ----------
window.filterOrders = function() {
    const search = document.getElementById('searchInput').value.toLowerCase();

    filteredOrders = ordersData.filter(o =>
        (o._id || '').toLowerCase().includes(search) ||
        (o.customerName || '').toLowerCase().includes(search)
    );

    currentPage = 1;
    renderOrders();
};

// ---------- INIT ----------
loadOrders();
</script>
</body>
</html>
